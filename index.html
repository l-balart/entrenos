<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Entrenos">
<title>Entrenos</title>
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22Entrenos%22%2C%22short_name%22%3A%22Entrenos%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f7f4ef%22%2C%22theme_color%22%3A%22%23c8a97a%22%7D">
<style>
  :root {
    --bg: #f7f4ef;
    --surface: #ffffff;
    --surface2: #f0ece4;
    --border: #e0d8cc;
    --border2: #ccc3b4;
    --text: #1a1612;
    --text2: #6b5e4e;
    --text3: #9e8e7d;
    --accent: #c8a97a;
    --accent-dark: #8a6d47;
    --accent-bg: #f5edd9;
    --danger: #c0392b;
    --danger-bg: #fdf0ee;
    --success: #2d7a4f;
    --success-bg: #edf7f1;
    --cycle-menst: #e07070;
    --cycle-folic: #70a8d0;
    --cycle-ovul: #7dbf7d;
    --cycle-lut: #c49ad4;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); font-family: -apple-system, 'Helvetica Neue', sans-serif; color: var(--text); overscroll-behavior: none; }

  /* NAV */
  #app { display: flex; flex-direction: column; height: 100dvh; }
  #content { flex: 1; overflow-y: auto; padding-bottom: 80px; }
  #nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom, 0); }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 4px 8px; gap: 3px; background: none; border: none; color: var(--text3); font-size: 10px; cursor: pointer; transition: color .15s; }
  .nav-btn.active { color: var(--accent-dark); }
  .nav-btn svg { width: 22px; height: 22px; }

  /* HEADER */
  .page-header { padding: 56px 20px 16px; }
  .page-header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  .page-header p { font-size: 14px; color: var(--text2); margin-top: 4px; }

  /* SECTIONS */
  .section { padding: 0 16px; margin-bottom: 20px; }
  .section-title { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; padding: 0 4px; }

  /* CARDS */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; }
  .card-row { display: flex; align-items: center; justify-content: space-between; }

  /* BUTTONS */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 18px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: var(--surface); color: var(--text); font-size: 14px; font-weight: 500; cursor: pointer; transition: all .15s; white-space: nowrap; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent-dark); border-color: var(--accent-dark); color: white; }
  .btn-danger { background: var(--danger-bg); border-color: var(--danger); color: var(--danger); }
  .btn-full { width: 100%; }
  .btn-sm { padding: 6px 12px; font-size: 13px; }
  .btn-icon { padding: 8px; border-radius: var(--radius-sm); }

  /* FORMS */
  .form-group { margin-bottom: 14px; }
  label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  input, select, textarea { width: 100%; padding: 11px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 15px; color: var(--text); appearance: none; -webkit-appearance: none; outline: none; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); background: white; }
  textarea { resize: vertical; min-height: 80px; }
  .rating-group { display: flex; gap: 8px; }
  .rating-btn { flex: 1; padding: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); text-align: center; font-size: 15px; font-weight: 600; cursor: pointer; transition: all .12s; color: var(--text2); }
  .rating-btn.sel { background: var(--accent-bg); border-color: var(--accent); color: var(--accent-dark); }

  /* TAGS */
  .tag { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
  .tag-menst { background: #fde8e8; color: #a03030; }
  .tag-folic { background: #e0f0f8; color: #2a5f88; }
  .tag-ovul  { background: #e0f4e0; color: #286628; }
  .tag-lut   { background: #f0e6f8; color: #6a3a88; }

  /* EXERCISE ITEM */
  .ex-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 8px; }
  .ex-name { font-size: 15px; font-weight: 600; }
  .ex-meta { font-size: 13px; color: var(--text2); margin-top: 4px; }

  /* SCORE DISPLAY */
  .score-ring { width: 72px; height: 72px; }
  .score-pair { display: flex; gap: 12px; }
  .score-card { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; text-align: center; }
  .score-num { font-size: 28px; font-weight: 700; }
  .score-label { font-size: 11px; color: var(--text3); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* PROGRESS CHARTS */
  .chart-container { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
  .chart-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
  .mini-chart { display: flex; align-items: flex-end; gap: 4px; height: 60px; }
  .bar { flex: 1; border-radius: 3px 3px 0 0; min-height: 4px; transition: height .3s; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; display: flex; align-items: flex-end; }
  .modal { background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; max-height: 92dvh; overflow-y: auto; padding: 20px 20px calc(20px + env(safe-area-inset-bottom, 0)); }
  .modal-handle { width: 40px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 16px; }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
  .hidden { display: none !important; }

  /* EXERCISE SELECTOR */
  .ex-select-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); gap: 12px; cursor: pointer; }
  .ex-select-item:last-child { border-bottom: none; }
  .ex-checkbox { width: 22px; height: 22px; border: 2px solid var(--border2); border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .ex-checkbox.checked { background: var(--accent-dark); border-color: var(--accent-dark); }

  /* HISTORY ITEM */
  .history-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; cursor: pointer; }
  .history-date { font-size: 13px; font-weight: 700; color: var(--text2); }
  .history-exs { font-size: 13px; color: var(--text3); margin-top: 4px; }

  /* LOAD INLINE FIELDS */
  .load-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; flex-wrap: wrap; }
  .load-input { flex: 1; min-width: 80px; padding: 8px 10px; font-size: 14px; }
  .load-label { font-size: 12px; color: var(--text3); white-space: nowrap; }

  /* STATS GRID */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
  .stat-val { font-size: 22px; font-weight: 700; }
  .stat-lbl { font-size: 12px; color: var(--text3); margin-top: 2px; }

  /* CHIP GROUP */
  .chip-group { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border2); font-size: 13px; cursor: pointer; background: var(--bg); color: var(--text2); }
  .chip.sel { background: var(--accent-dark); border-color: var(--accent-dark); color: white; }

  /* SEARCH */
  .search-input { position: relative; }
  .search-input input { padding-left: 36px; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }

  /* CYCLE PHASE INDICATOR */
  .phase-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }

  /* WEEKLY HEATMAP */
  .heatmap-row { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
  .heatmap-cell { width: 28px; height: 28px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 9px; color: var(--text3); }
  .heatmap-cell.has-data { background: var(--accent-bg); border-color: var(--accent); color: var(--accent-dark); font-weight: 600; }

  /* SCORE BAR */
  .score-bar-wrap { margin-top: 8px; background: var(--bg); border-radius: 4px; height: 6px; }
  .score-bar-fill { height: 6px; border-radius: 4px; background: var(--accent); }

  .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
  .flex-row { display: flex; align-items: center; gap: 8px; }
  .flex-col { display: flex; flex-direction: column; gap: 8px; }
  .mt-8 { margin-top: 8px; }
  .mt-16 { margin-top: 16px; }
  .text-sm { font-size: 13px; }
  .text-muted { color: var(--text3); }
  .font-bold { font-weight: 700; }
  .text-accent { color: var(--accent-dark); }

  /* SPARKLINE */
  .sparkline { width: 100%; height: 48px; }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text3); }
  .empty-state svg { margin: 0 auto 12px; display: block; opacity: .4; }
  .empty-state p { font-size: 14px; }

  /* NOTIFICATION */
  #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #1a1612; color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 500; z-index: 999; opacity: 0; transition: opacity .2s; pointer-events: none; white-space: nowrap; }
  #toast.show { opacity: 1; }
</style>
</head>
<body>
<div id="app">
  <div id="content"></div>
  <nav id="nav">
    <button class="nav-btn active" onclick="navigate('home')" id="nav-home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      Inicio
    </button>
    <button class="nav-btn" onclick="navigate('log')" id="nav-log">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Registrar
    </button>
    <button class="nav-btn" onclick="navigate('progress')" id="nav-progress">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Progreso
    </button>
    <button class="nav-btn" onclick="navigate('exercises')" id="nav-exercises">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6.5 6.5h11v11h-11z"/><path d="M3 9.5h3v5H3z"/><path d="M18 9.5h3v5h-3z"/><path d="M9.5 3h5v3h-5z"/><path d="M9.5 18h5v3h-5z"/></svg>
      Ejercicios
    </button>
    <button class="nav-btn" onclick="navigate('settings')" id="nav-settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      Ajustes
    </button>
  </nav>
</div>

<div id="modal-overlay" class="modal-overlay hidden" onclick="closeModalOnOverlay(event)">
  <div class="modal" id="modal-content"></div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════
// DATA STORE
// ═══════════════════════════════════════════════
const DB = {
  get exercises() { return JSON.parse(localStorage.getItem('exercises') || '[]'); },
  set exercises(v) { localStorage.setItem('exercises', JSON.stringify(v)); },
  get sessions() { return JSON.parse(localStorage.getItem('sessions') || '[]'); },
  set sessions(v) { localStorage.setItem('sessions', JSON.stringify(v)); },
};

// Seed default exercises from the user's excel
if (!localStorage.getItem('exercises')) {
  const defaults = [
    "Apertura de cadera miniband","Boxeo al aire","Curl de bíceps","Curl de bíceps martillo con goma",
    "Desplazamiento lateral tocando tibias","Elevaciones laterales","Flexiones inclinadas","Jumping Jacks",
    "Pallof press de rodillas mano colateral isotónico","Pasos laterales con miniband","Plancha",
    "Plancha lateral isométrica","Peso muerto rumano con kettle/barra","Peso muerto a una pierna con mochila",
    "Press de banca mancuernas","Press banca inclinado con dos mancuernas","Press francés banco con mancuernas",
    "Press militar","Press de tríceps bilateral","Press vertical de hombros con mochila",
    "Puente de glúteo con pesa rusa","Puente de glúteo unilateral KB","Puente de isquios isométrico",
    "Pull over bicho muerto","Remo a una mano con mancuerna","Remo a una mano sentado (goma)",
    "Remo con goma","Remo con goma a una mano","Remo a una mano con mochila",
    "Sentadilla box pie quebrado goblet","Sentadilla box con extensión de brazos","Sentadilla box goblet",
    "Sentadilla goblet","Sentadilla isométrica en pared","Sentadilla sumo KB","Sentadilla + subida de rodilla",
    "Skipping","Mini zancadas con extensión vertical de brazos","Zancadas en pared","Zancada frontal con mancuernas"
  ];
  DB.exercises = defaults.map((n,i) => ({ id: 'ex_' + i, name: n }));
}

// ═══════════════════════════════════════════════
// ROUTING
// ═══════════════════════════════════════════════
let currentPage = 'home';
function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + page).classList.add('active');
  render();
}

function render() {
  const c = document.getElementById('content');
  if (currentPage === 'home') c.innerHTML = renderHome();
  else if (currentPage === 'log') c.innerHTML = renderLog();
  else if (currentPage === 'progress') c.innerHTML = renderProgress();
  else if (currentPage === 'exercises') c.innerHTML = renderExercises();
  else if (currentPage === 'settings') c.innerHTML = renderSettings();
  attachListeners();
}

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function formatDate(d) {
  const date = new Date(d);
  return date.toLocaleDateString('es-ES', { weekday: 'short', day: 'numeric', month: 'short' });
}
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function cycleTag(phase) {
  const map = { 'Menstruación': ['tag-menst','🔴'], 'Folicular': ['tag-folic','🔵'], 'Ovulación': ['tag-ovul','🟢'], 'Lútea': ['tag-lut','🟣'] };
  const [cls, _] = map[phase] || ['',''];
  return `<span class="tag ${cls}">${phase}</span>`;
}
function phaseExpectedScore(phase) {
  // Expected baseline performance by phase
  return { 'Folicular': 0.85, 'Ovulación': 1.0, 'Lútea': 0.65, 'Menstruación': 0.55 }[phase] || 0.75;
}
function calcScores(session) {
  // Absolute score: weighted avg of all available context fields
  const sw = getSettings().score_weights;
  const weights = { sleep: sw.sleep, energy: sw.energy, stress_inv: sw.stress, motivation: sw.motivation, soreness_inv: sw.soreness };
  let total = 0, wsum = 0;
  const push = (val, key, max) => { if (val != null && val !== '') { total += (val/max) * weights[key]; wsum += weights[key]; } };
  push(session.sleep, 'sleep', 5);
  push(session.energy, 'energy', 5);
  push(session.stress != null ? 6 - session.stress : null, 'stress_inv', 5);
  push(session.motivation, 'motivation', 5);
  push(session.soreness != null ? 6 - session.soreness : null, 'soreness_inv', 5);
  // Add exercise load contribution
  let loadScore = 0, loadCount = 0;
  (session.exercises || []).forEach(ex => {
    if (ex.rpe != null && ex.rpe !== '') { loadScore += ex.rpe / 10; loadCount++; }
  });
  if (loadCount > 0) { total += (loadScore/loadCount) * sw.rpe; wsum += sw.rpe; }
  const absolute = wsum > 0 ? Math.round((total/wsum) * 100) : null;
  // Relative score: adjust by cycle phase expectation
  if (absolute === null) return { absolute: null, relative: null };
  const expected = phaseExpectedScore(session.cycle) * 100;
  const relative = Math.min(100, Math.round(absolute / (expected / 100) * 0.7 + absolute * 0.3));
  return { absolute, relative };
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
function uid() { return 'id_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }

// ═══════════════════════════════════════════════
// HOME PAGE
// ═══════════════════════════════════════════════
function renderHome() {
  const sessions = DB.sessions.sort((a,b) => b.date.localeCompare(a.date));
  const recent = sessions.slice(0, 5);
  const today = todayStr();
  const todaySess = sessions.find(s => s.date === today);

  // Streak
  let streak = 0;
  const dates = new Set(sessions.map(s => s.date));
  let d = new Date(); d.setDate(d.getDate() - (todaySess ? 0 : 1));
  while (dates.has(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`)) {
    streak++; d.setDate(d.getDate()-1);
  }

  // This week
  const weekStart = new Date(); weekStart.setDate(weekStart.getDate() - weekStart.getDay() + 1);
  const weekSess = sessions.filter(s => new Date(s.date) >= weekStart).length;

  return `
  <div class="page-header">
    <h1>Hola 👋</h1>
    <p>${new Date().toLocaleDateString('es-ES', { weekday:'long', day:'numeric', month:'long' })}</p>
  </div>

  <div class="section">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-val">${sessions.length}</div>
        <div class="stat-lbl">Entrenos totales</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${weekSess}</div>
        <div class="stat-lbl">Esta semana</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${streak}</div>
        <div class="stat-lbl">Racha (días)</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${sessions.length > 0 ? Math.round(sessions.reduce((a,s) => a + (s.duration||0),0)/sessions.length) : 0}<span style="font-size:14px;font-weight:400;color:var(--text3)">min</span></div>
        <div class="stat-lbl">Media duración</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${(() => { const ks=sessions.filter(s=>s.kcal); return ks.length ? Math.round(ks.reduce((a,s)=>a+s.kcal,0)/ks.length) : '-'; })()}<span style="font-size:11px;font-weight:400;color:var(--text3)">${sessions.some(s=>s.kcal)?'kcal':''}</span></div>
        <div class="stat-lbl">Media kcal/día</div>
      </div>
    </div>
  </div>

  ${!todaySess ? `
  <div class="section">
    <button class="btn btn-primary btn-full" onclick="navigate('log')" style="padding:14px;font-size:16px;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Registrar entreno de hoy
    </button>
  </div>` : `
  <div class="section">
    <div class="card" style="border-color:var(--accent);background:var(--accent-bg);">
      <div class="flex-row">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent-dark)" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        <span style="font-size:14px;font-weight:600;color:var(--accent-dark)">Entreno registrado hoy</span>
      </div>
    </div>
  </div>`}

  <div class="section">
    <div class="section-title">Últimos entrenos</div>
    ${recent.length === 0 ? `<div class="empty-state"><p>Aún no hay entrenos registrados</p></div>` :
      recent.map(s => {
        const scores = calcScores(s);
        return `
        <div class="history-item" onclick="showSessionDetail('${s.id}')">
          <div class="flex-row" style="justify-content:space-between;">
            <div>
              <div class="history-date">${formatDate(s.date)}</div>
              <div class="history-exs">${(s.exercises||[]).length} ejercicios${s.duration ? ' · ' + s.duration + 'min' : ''}</div>
            </div>
            <div style="display:flex;gap:8px;align-items:center;">
              ${cycleTag(s.cycle)}
              ${scores.absolute !== null ? `<span style="font-size:13px;font-weight:700;color:var(--accent-dark)">${scores.absolute}</span>` : ''}
            </div>
          </div>
        </div>`;
      }).join('')
    }
    ${sessions.length > 5 ? `<button class="btn btn-full btn-sm mt-8" onclick="showAllSessions()">Ver todos (${sessions.length})</button>` : ''}
  </div>
  </div>`;
}

let logState = null;

function resetLogState() {
  logState = {
    date: todayStr(),
    cycle: '',
    sleep: null, energy: null, stress: null, motivation: null, soreness: null,
    duration: '',
    notes: '',
    kcal: null,
    exercises: []
  };
}

function renderLog() {
  if (!logState) resetLogState();
  const exercises = DB.exercises;
  const sel = logState.exercises;

  return `
  <div class="page-header">
    <h1>Registrar</h1>
  </div>

  <div class="section">
    <div class="section-title">Fecha</div>
    <div class="card" style="padding:12px 14px;">

    </div>
  </div>

  <div class="section">
    <div class="section-title">Fase del ciclo</div>
    <div class="chip-group">

  <div class="section">

    <div class="card" style="gap:14px;display:flex;flex-direction:column;">

      ${renderRatingRow('Energía','energy',5)}

      </div>
      <div>
        <div class="section-title">Kcal consumidas</div>
        <input type="number" id="log-kcal" value="${logState.kcal||''}" placeholder="ej. 1800" min="0" max="9999" onchange="logState.kcal=+this.value||null">

  </div>

  <div class="section">

  <div class="section">

  <div class="section">
    <button class="btn btn-primary btn-full" style="padding:14px;font-size:16px;" onclick="saveSession()">Guardar entreno</button>
    <button class="btn btn-full mt-8" style="color:var(--text3);" onclick="resetLog()">Limpiar</button>

function renderRatingRow(label, key, max) {
  return `
  <div>
    <label style="margin-bottom:8px;">${label}</label>
    <div class="rating-group">
      ${Array.from({length:max},(_,i)=>i+1).map(v=>`
        <div class="rating-btn ${logState[key]===v?'sel':''}" onclick="logState['${key}']=${v};render();">${v}</div>
      `).join('')}
    </div>
  </div>`;
}

function renderLogExercise(ex, idx) {
  const mat = ex.material || '';
  return `
  <div class="ex-item" style="margin-bottom:10px;">
    <div class="flex-row" style="justify-content:space-between;margin-bottom:8px;">
      <span class="ex-name">${ex.name}</span>
      <button class="btn btn-sm btn-danger btn-icon" onclick="removeLogExercise(${idx})">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
      <div>
        <label>Series</label>
        <input type="number" min="1" value="${ex.sets||''}" placeholder="3" onchange="updateLogEx(${idx},'sets',+this.value||null)">
      </div>
      <div>
        <label>Reps / tiempo</label>
        <input type="text" value="${ex.reps||''}" placeholder="12 / 30s" onchange="updateLogEx(${idx},'reps',this.value)">

          <option value="${m}" ${mat===m?'selected':''}>${m}</option>
        `).join('')}
      </select>

    ${mat === 'Goma' || mat === 'Miniband' ? `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;">
      <div>
        <label>Resistencia usada</label>
        <input type="number" min="1" value="${ex.resist_used||''}" placeholder="2" onchange="updateLogEx(${idx},'resist_used',+this.value||null)">
      </div>
      <div>
        <label>Resistencia máx</label>
        <input type="number" min="1" value="${ex.resist_max||''}" placeholder="3" onchange="updateLogEx(${idx},'resist_max',+this.value||null)">
      </div>
    </div>` : ''}

    ${mat === 'Mancuerna' ? `
    <div style="margin-top:8px;">
      <label>Peso por mancuerna (kg)</label>
      <input type="number" min="0.5" step="0.5" value="${ex.kg||''}" placeholder="ej. 5" onchange="updateLogEx(${idx},'kg',+this.value||null)">
    </div>` : ''}

    ${mat === 'Barra' || mat === 'Kettlebell' ? `
    <div style="margin-top:8px;">
      <label>Peso total (kg)</label>
      <input type="number" min="0.5" step="0.5" value="${ex.kg||''}" placeholder="ej. 20" onchange="updateLogEx(${idx},'kg',+this.value||null)">
    </div>` : ''}

    <div style="margin-top:8px;">
      <label>RPE (1-10)</label>
      <input type="number" min="1" max="10" value="${ex.rpe||''}" placeholder="7" onchange="updateLogEx(${idx},'rpe',+this.value||null)">
    </div>

    <div style="margin-top:8px;">
      <label>Comentarios</label>
      <input type="text" value="${ex.notes||''}" placeholder="Notas del ejercicio" onchange="updateLogEx(${idx},'notes',this.value)">
    </div>
  </div>`;
}

function updateLogEx(idx, key, val) {
  if (logState.exercises[idx]) logState.exercises[idx][key] = val;
}
function removeLogExercise(idx) {
  logState.exercises.splice(idx, 1);
  render();
}

function openExercisePicker() {
  const exercises = DB.exercises;
  const selectedIds = new Set(logState.exercises.map(e => e.id));
  let searchQ = '';

  function pickerContent() {
    const filtered = exercises.filter(e => e.name.toLowerCase().includes(searchQ.toLowerCase()));
    return `
    <div class="modal-handle"></div>
    <div class="modal-title">Seleccionar ejercicio</div>
    <div class="search-input" style="margin-bottom:14px;">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="picker-search" placeholder="Buscar ejercicio..." value="${searchQ}" oninput="searchQ=this.value;updatePicker();">
    </div>
    <div id="picker-list">
      ${filtered.map(e => `
        <div class="ex-select-item" onclick="togglePickerEx('${e.id}')">
          <div class="ex-checkbox ${selectedIds.has(e.id)?'checked':''}">
            ${selectedIds.has(e.id) ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
          </div>
          <span style="font-size:15px;">${e.name}</span>
        </div>
      `).join('')}
    </div>
    <div style="margin-top:16px;">
      <button class="btn btn-primary btn-full" onclick="closePicker()">Listo</button>
    </div>`;
  }

  window.updatePicker = function() {
    const filtered = DB.exercises.filter(e => e.name.toLowerCase().includes(searchQ.toLowerCase()));
    document.getElementById('picker-list').innerHTML = filtered.map(e => `
      <div class="ex-select-item" onclick="togglePickerEx('${e.id}')">
        <div class="ex-checkbox ${selectedIds.has(e.id)?'checked':''}">
          ${selectedIds.has(e.id) ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
        </div>
        <span style="font-size:15px;">${e.name}</span>
      </div>
    `).join('');
  };

  window.togglePickerEx = function(id) {
    const ex = DB.exercises.find(e => e.id === id);
    if (!ex) return;
    if (selectedIds.has(id)) {
      selectedIds.delete(id);
      logState.exercises = logState.exercises.filter(e => e.id !== id);
    } else {
      selectedIds.add(id);
      logState.exercises.push({ id: ex.id, name: ex.name, sets:null, reps:'', material: ex.defaultMaterial||'', kg:null, resist_used:null, resist_max:null, rpe:null, notes:'' });
    }
    updatePicker();
  };

  window.closePicker = function() {
    closeModal();
    render();
  };

  openModal(pickerContent());
  setTimeout(() => document.getElementById('picker-search')?.focus(), 100);
}

function saveSession() {
  if (!logState.cycle) { toast('Selecciona la fase del ciclo'); return; }
  const sessions = DB.sessions;
  const existing = sessions.findIndex(s => s.id === (logState.id || ''));
  const session = { ...logState, id: logState.id || uid() };
  if (existing >= 0) sessions[existing] = session;
  else sessions.push(session);
  DB.sessions = sessions;
  resetLogState();
  toast('Entreno guardado ✓');
  navigate('home');
}

function resetLog() {
  if (confirm('¿Limpiar el formulario?')) { resetLogState(); render(); }
}

// PROGRESS PAGE
// ═══════════════════════════════════════════════
let progressTab = 'general';
let selectedExercise = null;
let progressDateFrom = '';
let progressDateTo = '';
let expandedPhase = null;

function renderProgress() {
  const sessions = DB.sessions.sort((a,b) => a.date.localeCompare(b.date));

  return `
  <div class="page-header">
    <h1>Progreso</h1>
  </div>

  <div class="section">
    <div class="chip-group" style="margin-bottom:16px;">
      <div class="chip ${progressTab==='general'?'sel':''}" onclick="progressTab='general';render();">General</div>
      <div class="chip ${progressTab==='exercise'?'sel':''}" onclick="progressTab='exercise';render();">Por ejercicio</div>
      <div class="chip ${progressTab==='cycle'?'sel':''}" onclick="progressTab='cycle';render();">Ciclo</div>
    </div>
    ${progressTab==='general' ? renderProgressGeneral(sessions) : ''}
    ${progressTab==='exercise' ? renderProgressExercise(sessions) : ''}
    ${progressTab==='cycle' ? renderProgressCycle(sessions) : ''}
  </div>`;
}

function renderProgressGeneral(allSessions) {
  if (allSessions.length === 0) return `<div class="empty-state"><p>Sin datos aún</p></div>`;

  // Date filter
  let sessions = allSessions;
  if (progressDateFrom) sessions = sessions.filter(s => s.date >= progressDateFrom);
  if (progressDateTo)   sessions = sessions.filter(s => s.date <= progressDateTo);
  if (sessions.length === 0) return `
    ${renderDateFilter()}
    <div class="empty-state"><p>Sin entrenos en ese periodo</p></div>`;

  const scores = sessions.map(s => calcScores(s));
  const absScores = scores.map(s => s.absolute).filter(v => v !== null);
  const relScores = scores.map(s => s.relative).filter(v => v !== null);
  const avgAbs = absScores.length ? Math.round(absScores.reduce((a,b)=>a+b,0)/absScores.length) : null;
  const avgRel = relScores.length ? Math.round(relScores.reduce((a,b)=>a+b,0)/relScores.length) : null;

  // Weeks
  const weekMap = {};
  sessions.forEach(s => {
    const d = new Date(s.date);
    const week = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-W' + Math.ceil(d.getDate()/7);
    weekMap[week] = (weekMap[week]||0)+1;
  });
  const weekKeys = Object.keys(weekMap).sort();
  const weekCounts = weekKeys.map(k => weekMap[k]);
  const maxW = Math.max(...weekCounts, 1);

  // Bienestar avgs
  const bioKeys = ['sleep','energy','stress','motivation','soreness'];
  const bioAvgs = {};
  bioKeys.forEach(k => {
    const vals = sessions.map(s=>s[k]).filter(v=>v!=null);
    bioAvgs[k] = vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1) : '-';
  });

  // Score explanation for a representative session
  const sw = getSettings().score_weights;

  return `
  ${renderDateFilter()}

  ${avgAbs !== null ? `
  <div class="score-pair" style="margin-bottom:16px;">
    <div class="score-card" style="cursor:pointer;" onclick="showScoreExplanation()">
      <div class="score-num" style="color:var(--accent-dark)">${avgAbs}</div>
      <div class="score-label">Calidad absoluta <span style="color:var(--accent);font-size:10px;">ℹ</span></div>
      <div class="score-bar-wrap"><div class="score-bar-fill" style="width:${avgAbs}%"></div></div>
    </div>
    <div class="score-card" style="cursor:pointer;" onclick="showScoreExplanation()">
      <div class="score-num" style="color:var(--success)">${avgRel}</div>
      <div class="score-label">Calidad relativa <span style="color:var(--success);font-size:10px;">ℹ</span></div>
      <div class="score-bar-wrap"><div class="score-bar-fill" style="width:${avgRel}%;background:var(--success)"></div></div>
    </div>
  </div>` : ''}

  <div class="chart-container">
    <div class="flex-row" style="justify-content:space-between;margin-bottom:8px;">
      <div class="chart-title" style="margin:0;">Entrenos por semana</div>
      <span class="text-sm text-muted">${sessions.length} total</span>
    </div>
    <div class="mini-chart">
      ${weekCounts.map((v,i)=>`<div class="bar" title="${weekKeys[i]}: ${v}" style="height:${Math.round((v/maxW)*100)}%;background:var(--accent);"></div>`).join('')}
    </div>
    <div class="flex-row" style="justify-content:space-between;margin-top:4px;">
      <span style="font-size:10px;color:var(--text3);">${weekKeys[0]||''}</span>
      <span style="font-size:10px;color:var(--text3);">${weekKeys[weekKeys.length-1]||''}</span>
    </div>
  </div>

  <div class="chart-container">
    <div class="chart-title">Bienestar promedio</div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      ${[['Sueño','sleep'],['Energía','energy'],['Estrés','stress'],['Motivación','motivation'],['Agujetas','soreness']].map(([lbl,key])=>`
        <div>
          <div class="flex-row" style="justify-content:space-between;margin-bottom:4px;">
            <span class="text-sm text-muted">${lbl}</span>
            <span class="text-sm font-bold">${bioAvgs[key]}/5</span>
          </div>
          <div class="score-bar-wrap"><div class="score-bar-fill" style="width:${bioAvgs[key]!=='-'?(bioAvgs[key]/5*100).toFixed(0):0}%"></div></div>
        </div>
      `).join('')}
    </div>
  </div>

  ${absScores.length > 1 ? `
  <div class="chart-container" style="cursor:pointer;" onclick="showScoreExplanation()">
    <div class="flex-row" style="justify-content:space-between;margin-bottom:8px;">
      <div class="chart-title" style="margin:0;">Evolución calidad</div>
      <span style="font-size:12px;color:var(--accent);">¿Cómo se calcula? ↗</span>
    </div>
    <div class="mini-chart">
      ${absScores.map((v,i)=>`<div class="bar" style="height:${v}%;background:${relScores[i]>=v?'var(--success)':'var(--accent)'};opacity:0.85;"></div>`).join('')}
    </div>
    <div class="flex-row mt-8" style="gap:16px;">
      <div class="flex-row"><div style="width:10px;height:10px;border-radius:2px;background:var(--accent)"></div><span class="text-sm text-muted">Absoluta</span></div>
      <div class="flex-row"><div style="width:10px;height:10px;border-radius:2px;background:var(--success)"></div><span class="text-sm text-muted">Relativa ≥ Abs</span></div>
    </div>
  </div>` : ''}`;
}

function renderDateFilter() {
  return `
  <div class="card" style="margin-bottom:16px;padding:12px 14px;">
    <div style="font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;">Filtrar por fecha</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:end;">
      <div>
        <label>Desde</label>
        <input type="date" value="${progressDateFrom}" onchange="progressDateFrom=this.value;render();">
      </div>
      <div>
        <label>Hasta</label>
        <input type="date" value="${progressDateTo}" onchange="progressDateTo=this.value;render();">
      </div>
    </div>
    ${progressDateFrom||progressDateTo ? `<button class="btn btn-sm mt-8" style="color:var(--text3);" onclick="progressDateFrom='';progressDateTo='';render();">Quitar filtro</button>` : ''}
  </div>`;
}

function showScoreExplanation() {
  const sw = getSettings().score_weights;
  openModal(`
    <div class="modal-handle"></div>
    <div class="modal-title">Cómo se calcula la puntuación</div>

    <p class="text-sm" style="color:var(--text2);margin-bottom:16px;">Cada entreno recibe dos puntuaciones de 0 a 100 basadas en los factores que registras.</p>

    <div class="section-title">Puntuación absoluta</div>
    <p class="text-sm" style="color:var(--text2);margin:8px 0 12px;">Media ponderada de todos los factores del día, cada uno normalizado a escala 0–1. El estrés y las agujetas se invierten (más estrés = peor puntuación).</p>
    <div class="card" style="margin-bottom:16px;">
      ${[
        ['Sueño','sleep','1–5, normalizado'],
        ['Energía','energy','1–5, normalizado (más peso)'],
        ['Estrés','stress','1–5, invertido'],
        ['Motivación','motivation','1–5, normalizado'],
        ['Agujetas','soreness','1–5, invertido'],
        ['RPE medio','rpe','0–10, normalizado (más peso)'],
      ].map(([lbl,key,desc]) => `
        <div class="flex-row" style="justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--border);">
          <div>
            <div style="font-size:13px;font-weight:600;">${lbl}</div>
            <div class="text-sm text-muted">${desc}</div>
          </div>
          <div style="font-size:16px;font-weight:700;color:var(--accent-dark);">×${sw[key]}</div>
        </div>
      `).join('')}
      <p class="text-sm text-muted" style="margin-top:8px;">Los pesos × se configuran en Ajustes → Ponderación.</p>
    </div>

    <div class="section-title">Puntuación relativa</div>
    <p class="text-sm" style="color:var(--text2);margin:8px 0 12px;">Ajusta la puntuación absoluta según lo que se espera de tu cuerpo en cada fase del ciclo. Un buen entreno en fase lútea (donde el baseline esperado es bajo) puntúa más alto en la métrica relativa que el mismo entreno en ovulación.</p>
    <div class="card" style="margin-bottom:16px;">
      ${[['Menstruación','55%'],['Folicular','85%'],['Ovulación','100%'],['Lútea','65%']].map(([p,e])=>`
        <div class="flex-row" style="justify-content:space-between;padding:5px 0;border-bottom:0.5px solid var(--border);">
          <span style="font-size:13px;">${p}</span>
          <span style="font-size:13px;font-weight:700;color:var(--text2);">Baseline esperado: ${e}</span>
        </div>
      `).join('')}
    </div>
    <p class="text-sm text-muted">Fórmula: <code>relativa = (absoluta / baseline) × 0.7 + absoluta × 0.3</code>, con tope en 100.</p>

    <button class="btn btn-full mt-8" onclick="closeModal()">Entendido</button>
  `);
}

function renderProgressExercise(sessions) {
  const exercises = DB.exercises;
  // Count sessions per exercise
  const exCount = {};
  sessions.forEach(s => (s.exercises||[]).forEach(e => { exCount[e.id] = (exCount[e.id]||0)+1; }));
  const sorted = exercises.filter(e=>exCount[e.id]>0).sort((a,b)=>(exCount[b.id]||0)-(exCount[a.id]||0));

  if (!selectedExercise) {
    return `
    <div class="chart-container" style="margin-bottom:12px;">
      <div class="chart-title">Frecuencia de ejercicios</div>
      ${sorted.slice(0,10).map(e=>`
        <div style="margin-bottom:8px;">
          <div class="flex-row" style="justify-content:space-between;margin-bottom:4px;">
            <span class="text-sm" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${e.name}</span>
            <span class="text-sm font-bold text-accent">${exCount[e.id]}x</span>
          </div>
          <div class="score-bar-wrap"><div class="score-bar-fill" style="width:${Math.round(exCount[e.id]/Math.max(...Object.values(exCount))*100)}%"></div></div>
        </div>
      `).join('')}
    </div>
    <div class="section-title">Ver progreso individual</div>
    ${sorted.map(e=>`
      <div class="ex-item" style="cursor:pointer;" onclick="selectedExercise='${e.id}';render();">
        <div class="flex-row" style="justify-content:space-between;">
          <span class="ex-name">${e.name}</span>
          <span class="text-sm text-muted">${exCount[e.id]}x</span>
        </div>
      </div>
    `).join('')}`;
  }

  // Individual exercise detail
  const ex = exercises.find(e=>e.id===selectedExercise);
  const exSessions = sessions.map(s => ({ date: s.date, exData: (s.exercises||[]).find(e=>e.id===selectedExercise) }))
    .filter(s=>s.exData).sort((a,b)=>a.date.localeCompare(b.date));

  const kgData = exSessions.filter(s=>s.exData.kg).map(s=>s.exData.kg);
  const rpeData = exSessions.filter(s=>s.exData.rpe).map(s=>s.exData.rpe);
  const resistData = exSessions.filter(s=>s.exData.resist_used).map(s=>s.exData.resist_used);
  const maxKg = kgData.length ? Math.max(...kgData) : null;

  return `
  <button class="btn btn-sm" style="margin-bottom:16px;" onclick="selectedExercise=null;render();">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    Volver
  </button>
  <div style="font-size:17px;font-weight:700;margin-bottom:16px;">${ex?.name}</div>

  <div class="stats-grid" style="margin-bottom:16px;">
    <div class="stat-card"><div class="stat-val">${exSessions.length}</div><div class="stat-lbl">Veces ejecutado</div></div>
    ${maxKg ? `<div class="stat-card"><div class="stat-val">${maxKg}<span style="font-size:13px;font-weight:400;color:var(--text3)">kg</span></div><div class="stat-lbl">Peso máximo</div></div>` : '<div></div>'}
  </div>

  ${kgData.length > 1 ? `
  <div class="chart-container">
    <div class="chart-title">Progresión de carga (kg)</div>
    <div class="mini-chart">
      ${kgData.map(v=>`<div class="bar" style="height:${Math.round((v/Math.max(...kgData))*100)}%;background:var(--accent-dark);"></div>`).join('')}
    </div>
    <div class="flex-row" style="justify-content:space-between;margin-top:6px;">
      <span class="text-sm text-muted">${kgData[0]}kg</span>
      <span class="text-sm font-bold text-accent">→ ${kgData[kgData.length-1]}kg</span>
    </div>
  </div>` : ''}

  ${resistData.length > 1 ? `
  <div class="chart-container">
    <div class="chart-title">Progresión resistencia</div>
    <div class="mini-chart">
      ${resistData.map(v=>`<div class="bar" style="height:${Math.round((v/Math.max(...resistData))*100)}%;background:var(--cycle-folic);"></div>`).join('')}
    </div>
  </div>` : ''}

  ${rpeData.length > 1 ? `
  <div class="chart-container">
    <div class="chart-title">RPE a lo largo del tiempo</div>
    <div class="mini-chart">
      ${rpeData.map(v=>`<div class="bar" style="height:${v*10}%;background:${v>=8?'#e07070':v>=6?'var(--accent)':'var(--success)'};"></div>`).join('')}
    </div>
  </div>` : ''}

  <div class="section-title" style="margin-top:8px;">Historial</div>
  ${exSessions.slice().reverse().slice(0,10).map(s=>`
    <div class="ex-item">
      <div class="flex-row" style="justify-content:space-between;">
        <span class="text-sm font-bold">${formatDate(s.date)}</span>
        <span class="text-sm text-muted">${[s.exData.sets && s.exData.sets+'x', s.exData.reps, s.exData.kg && s.exData.kg+'kg', s.exData.rpe && 'RPE '+s.exData.rpe].filter(Boolean).join(' · ')}</span>
      </div>
      ${s.exData.notes ? `<div class="text-sm text-muted mt-8">${s.exData.notes}</div>` : ''}
    </div>
  `).join('')}`;
}

function renderProgressCycle(sessions) {
  const phases = ['Menstruación','Folicular','Ovulación','Lútea'];
  const phaseColors = { 'Menstruación': 'var(--cycle-menst)', 'Folicular': 'var(--cycle-folic)', 'Ovulación': 'var(--cycle-ovul)', 'Lútea': 'var(--cycle-lut)' };
  const phaseData = {};
  phases.forEach(p => {
    const pSess = sessions.filter(s=>s.cycle===p);
    const scores = pSess.map(s=>calcScores(s));
    const abs = scores.map(s=>s.absolute).filter(v=>v!==null);
    const bio = { sleep:[], energy:[], stress:[], motivation:[], soreness:[] };
    pSess.forEach(s => { Object.keys(bio).forEach(k => { if(s[k]!=null) bio[k].push(s[k]); }); });
    phaseData[p] = {
      count: pSess.length,
      avgAbs: abs.length ? Math.round(abs.reduce((a,b)=>a+b,0)/abs.length) : null,
      avgSleep: bio.sleep.length ? (bio.sleep.reduce((a,b)=>a+b,0)/bio.sleep.length).toFixed(1) : null,
      avgEnergy: bio.energy.length ? (bio.energy.reduce((a,b)=>a+b,0)/bio.energy.length).toFixed(1) : null,
      avgStress: bio.stress.length ? (bio.stress.reduce((a,b)=>a+b,0)/bio.stress.length).toFixed(1) : null,
    };
  });

  if (sessions.length === 0) return `<div class="empty-state"><p>Sin datos aún</p></div>`;

  return `
  <div class="chart-container" style="margin-bottom:12px;">
    <div class="chart-title">Calidad media por fase del ciclo</div>
    <div class="mini-chart" style="align-items:flex-end;gap:8px;">
      ${phases.map(p=>{
        const d = phaseData[p];
        const h = d.avgAbs || 0;
        return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;">
          <span style="font-size:11px;font-weight:700;color:${phaseColors[p]}">${d.avgAbs||'-'}</span>
          <div style="width:100%;height:${h}%;min-height:4px;background:${phaseColors[p]};border-radius:3px 3px 0 0;"></div>
          <span style="font-size:9px;color:var(--text3);text-align:center;">${p.slice(0,5)}</span>
        </div>`;
      }).join('')}
    </div>
  </div>

  ${phases.map(p=>{
    const d = phaseData[p];
    const info = PHASE_INFO[p];
    const isExpanded = expandedPhase === p;
    return `
    <div class="chart-container" style="margin-bottom:10px;">
      <div class="flex-row" style="margin-bottom:${d.count>0?'10px':'0'};cursor:pointer;" onclick="expandedPhase=expandedPhase==='${p}'?null:'${p}';render();">
        <div style="width:10px;height:10px;border-radius:50%;background:${phaseColors[p]};flex-shrink:0;margin-top:3px;"></div>
        <span class="chart-title" style="margin:0 0 0 8px;">${p}</span>
        <span class="text-sm text-muted" style="margin-left:auto;">${d.count>0?d.count+' entrenos':'sin datos'}</span>
        <span style="margin-left:10px;color:var(--text3);font-size:14px;">${isExpanded?'▲':'▼'}</span>
      </div>

      ${d.count > 0 ? `
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
        ${d.avgEnergy ? `<div style="text-align:center;"><div style="font-size:18px;font-weight:700;">${d.avgEnergy}</div><div class="text-sm text-muted">Energía</div></div>` : ''}
        ${d.avgSleep ? `<div style="text-align:center;"><div style="font-size:18px;font-weight:700;">${d.avgSleep}</div><div class="text-sm text-muted">Sueño</div></div>` : ''}
        ${d.avgStress ? `<div style="text-align:center;"><div style="font-size:18px;font-weight:700;">${d.avgStress}</div><div class="text-sm text-muted">Estrés</div></div>` : ''}
      </div>
      ${d.avgAbs ? `
      <div class="mt-8">
        <div class="flex-row" style="justify-content:space-between;margin-bottom:4px;">
          <span class="text-sm text-muted">Calidad media</span>
          <span class="text-sm font-bold">${d.avgAbs}/100</span>
        </div>
        <div class="score-bar-wrap"><div style="height:6px;border-radius:4px;background:${phaseColors[p]};width:${d.avgAbs}%"></div></div>
      </div>` : ''}` : ''}

      ${isExpanded ? `
      <div style="margin-top:14px;padding-top:14px;border-top:0.5px solid var(--border);">
        <div style="font-size:12px;font-weight:700;color:${phaseColors[p]};text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;">Energía física</div>
        <p class="text-sm" style="color:var(--text2);margin-bottom:12px;line-height:1.6;">${info.energia}</p>
        <div style="font-size:12px;font-weight:700;color:${phaseColors[p]};text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;">Entrenamiento</div>
        <p class="text-sm" style="color:var(--text2);margin-bottom:12px;line-height:1.6;">${info.entreno}</p>
        <div style="font-size:12px;font-weight:700;color:${phaseColors[p]};text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">Consejos</div>
        <div style="display:flex;flex-direction:column;gap:6px;">
          ${info.consejos.map(c=>`
            <div class="flex-row" style="align-items:flex-start;gap:8px;">
              <div style="width:6px;height:6px;border-radius:50%;background:${phaseColors[p]};flex-shrink:0;margin-top:5px;"></div>
              <span class="text-sm" style="color:var(--text2);line-height:1.5;">${c}</span>
            </div>
          `).join('')}
        </div>
      </div>` : `<div style="margin-top:10px;font-size:12px;color:var(--text3);">Pulsa para ver información sobre esta fase →</div>`}
    </div>`;
  }).join('')}`;
}

const MATERIALS = ['','Peso corporal','Mancuerna','Barra','Kettlebell','Goma','Miniband','Banda con asas'];
function materialOptions(sel) {
  return MATERIALS.map(m => `<option value="${m}" ${sel===m?'selected':''}>${m||'Sin material por defecto'}</option>`).join('');
}

function openAddExercise() {
  openModal(`
    <div class="modal-handle"></div>
    <div class="modal-title">Nuevo ejercicio</div>
    <div class="form-group">
      <label>Nombre del ejercicio</label>
      <input type="text" id="new-ex-name" placeholder="ej. Sentadilla búlgara">
    </div>
    <div class="form-group">
      <label>Material por defecto</label>
      <select id="new-ex-material">${materialOptions('')}</select>
    </div>
    <button class="btn btn-primary btn-full" onclick="saveNewExercise()">Guardar</button>
  `);
  setTimeout(() => document.getElementById('new-ex-name')?.focus(), 100);
}

function saveNewExercise() {
  const name = document.getElementById('new-ex-name')?.value.trim();
  if (!name) { toast('Introduce un nombre'); return; }
  const exercises = DB.exercises;
  if (exercises.find(e => e.name.toLowerCase() === name.toLowerCase())) { toast('Ya existe ese ejercicio'); return; }
  const material = document.getElementById('new-ex-material')?.value || '';
  exercises.push({ id: uid(), name, defaultMaterial: material });
  DB.exercises = exercises.sort((a, b) => a.name.localeCompare(b.name, 'es'));
  closeModal();
  render();
  toast('Ejercicio añadido ✓');
}

function openEditExercise(id) {
  const ex = DB.exercises.find(e => e.id === id);
  if (!ex) return;
  openModal(`
    <div class="modal-handle"></div>
    <div class="modal-title">Editar ejercicio</div>
    <div class="form-group">
      <label>Nombre</label>
      <input type="text" id="edit-ex-name" value="${ex.name}">
    </div>
    <div class="form-group">
      <label>Material por defecto</label>
      <select id="edit-ex-material">${materialOptions(ex.defaultMaterial||'')}</select>
    </div>
    <button class="btn btn-primary btn-full" onclick="saveEditExercise('${id}')">Guardar</button>
    <button class="btn btn-full mt-8" onclick="closeModal()">Cancelar</button>
  `);
}

function saveEditExercise(id) {
  const name = document.getElementById('edit-ex-name')?.value.trim();
  if (!name) return;
  const material = document.getElementById('edit-ex-material')?.value || '';
  const exercises = DB.exercises;
  const idx = exercises.findIndex(e => e.id === id);
  if (idx >= 0) { exercises[idx].name = name; exercises[idx].defaultMaterial = material; }
  DB.exercises = exercises.sort((a, b) => a.name.localeCompare(b.name, 'es'));
  closeModal();
  render();
  toast('Ejercicio actualizado ✓');
}

function deleteExercise(id) {
  if (!confirm('¿Eliminar este ejercicio?')) return;
  const exercises = DB.exercises.filter(e => e.id !== id);
  DB.exercises = exercises;
  render();
  toast('Ejercicio eliminado');
}

          session[k]!=null ? `<div><div class="text-sm text-muted">${l}</div><div class="font-bold">${session[k]}/5</div></div>` : ''
        ).join('')}
        ${session.duration ? `<div><div class="text-sm text-muted">Duración</div><div class="font-bold">${session.duration} min</div></div>` : ''}

          ex.material || '',
          ex.kg ? ex.kg+'kg' : '',
          ex.resist_used && ex.resist_max ? `${ex.resist_used}/${ex.resist_max}` : '',
          ex.rpe ? 'RPE '+ex.rpe : ''

        ${ex.notes ? `<div class="text-sm text-muted mt-8">${ex.notes}</div>` : ''}
      </div>
    `).join('')}` : ''}

    ${session.notes ? `<div class="card mt-8"><div class="text-sm text-muted" style="margin-bottom:4px;">Notas</div><div style="font-size:14px;">${session.notes}</div></div>` : ''}
  `);
}

function editSession(id) {
  const session = DB.sessions.find(s => s.id === id);

  logState = JSON.parse(JSON.stringify(session));

function deleteSession(id) {

function showAllSessions() {

function updateResist(type, val) {
  if (!val || val < 1) return;
  const s = getSettings();
  s.resist_max[type] = val;
  saveSettings(s);
  toast('Guardado ✓');
}

function updateScoreWeight(key, val) {
  const s = getSettings();
  s.score_weights[key] = val;
  saveSettings(s);
}

function resetScoreWeights() {
  const s = getSettings();
  s.score_weights = { sleep: 1.5, energy: 2.0, stress: 1.5, motivation: 1.5, soreness: 1.0, rpe: 2.0 };
  saveSettings(s);
  render();
  toast('Valores restaurados ✓');
}

function confirmDeleteAll() {
  openModal(`
    <div class="modal-handle"></div>
    <div class="modal-title" style="color:var(--danger);">¿Borrar todo?</div>
    <p class="text-sm" style="margin-bottom:20px;color:var(--text2);">Esta acción eliminará todos los entrenos y ejercicios. No se puede deshacer. Exporta un backup antes si quieres conservar los datos.</p>
    <button class="btn btn-danger btn-full" onclick="deleteAllData()">Sí, borrar todo</button>
    <button class="btn btn-full mt-8" onclick="closeModal()">Cancelar</button>
  `);
}

function deleteAllData() {
  localStorage.clear();
  closeModal();
  toast('Datos eliminados');
  location.reload();
}

// ═══════════════════════════════════════════════
// EXPORT / IMPORT
// ═══════════════════════════════════════════════
function exportData() {
  const data = {
    version: 1,
    exported_at: new Date().toISOString(),
    sessions: DB.sessions,
    exercises: DB.exercises
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'entrenos_backup_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('Backup exportado ✓');
}

function triggerImport() {
  document.getElementById('import-file').click();
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.sessions || !data.exercises) throw new Error('Formato inválido');
      const existingIds = new Set(DB.sessions.map(s => s.id));
      const newSessions = data.sessions.filter(s => !existingIds.has(s.id));
      const existingExIds = new Set(DB.exercises.map(ex => ex.id));
      const newExercises = data.exercises.filter(ex => !existingExIds.has(ex.id));
      DB.sessions = [...DB.sessions, ...newSessions];
      DB.exercises = [...DB.exercises, ...newExercises];
      toast(`Importados: ${newSessions.length} entrenos, ${newExercises.length} ejercicios nuevos ✓`);
      render();
    } catch(err) {
      toast('Error: archivo no válido');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function loadHistoricalData() {
  if (localStorage.getItem('historical_loaded_v2')) {
    toast('El historial ya estaba cargado');
    return;
  }
  const existingIds = new Set(DB.sessions.map(s => s.id));
  const newSessions = HISTORICAL_DATA.sessions.filter(s => !existingIds.has(s.id));
  const existingExIds = new Set(DB.exercises.map(ex => ex.id));
  const newExercises = HISTORICAL_DATA.exercises.filter(ex => !existingExIds.has(ex.id));
  DB.sessions = [...DB.sessions, ...newSessions];
  // Update exercises (replace with historical which have proper names)
  if (newExercises.length > 0) DB.exercises = [...DB.exercises, ...newExercises];
  localStorage.setItem('historical_loaded_v2', '1');
  toast(`Historial cargado: ${newSessions.length} entrenos ✓`);
  render();
}
