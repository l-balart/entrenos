<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Entrenos">
<title>Entrenos</title>
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22Entrenos%22%2C%22short_name%22%3A%22Entrenos%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f7f4ef%22%2C%22theme_color%22%3A%22%23c8a97a%22%7D">
<style>
  :root {
    --bg: #f7f4ef;
    --surface: #ffffff;
    --surface2: #f0ece4;
    --border: #e0d8cc;
    --border2: #ccc3b4;
    --text: #1a1612;
    --text2: #6b5e4e;
    --text3: #9e8e7d;
    --accent: #c8a97a;
    --accent-dark: #8a6d47;
    --accent-bg: #f5edd9;
    --danger: #c0392b;
    --danger-bg: #fdf0ee;
    --success: #2d7a4f;
    --success-bg: #edf7f1;
    --cycle-menst: #e07070;
    --cycle-folic: #70a8d0;
    --cycle-ovul: #7dbf7d;
    --cycle-lut: #c49ad4;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); font-family: -apple-system, 'Helvetica Neue', sans-serif; color: var(--text); overscroll-behavior: none; }

  /* NAV */
  #app { display: flex; flex-direction: column; height: 100dvh; }
  #content { flex: 1; overflow-y: auto; padding-bottom: 80px; }
  #nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom, 0); }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 4px 8px; gap: 3px; background: none; border: none; color: var(--text3); font-size: 10px; cursor: pointer; transition: color .15s; }
  .nav-btn.active { color: var(--accent-dark); }
  .nav-btn svg { width: 22px; height: 22px; }

  /* HEADER */
  .page-header { padding: 56px 20px 16px; }
  .page-header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  .page-header p { font-size: 14px; color: var(--text2); margin-top: 4px; }

  /* SECTIONS */
  .section { padding: 0 16px; margin-bottom: 20px; }
  .section-title { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; padding: 0 4px; }

  /* CARDS */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; }
  .card-row { display: flex; align-items: center; justify-content: space-between; }

  /* BUTTONS */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 18px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: var(--surface); color: var(--text); font-size: 14px; font-weight: 500; cursor: pointer; transition: all .15s; white-space: nowrap; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent-dark); border-color: var(--accent-dark); color: white; }
  .btn-danger { background: var(--danger-bg); border-color: var(--danger); color: var(--danger); }
  .btn-full { width: 100%; }
  .btn-sm { padding: 6px 12px; font-size: 13px; }
  .btn-icon { padding: 8px; border-radius: var(--radius-sm); }

  /* FORMS */
  .form-group { margin-bottom: 14px; }
  label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  input, select, textarea { width: 100%; padding: 11px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 15px; color: var(--text); appearance: none; -webkit-appearance: none; outline: none; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); background: white; }
  textarea { resize: vertical; min-height: 80px; }
  .rating-group { display: flex; gap: 8px; }
  .rating-btn { flex: 1; padding: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); text-align: center; font-size: 15px; font-weight: 600; cursor: pointer; transition: all .12s; color: var(--text2); }
  .rating-btn.sel { background: var(--accent-bg); border-color: var(--accent); color: var(--accent-dark); }

  /* TAGS */
  .tag { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
  .tag-menst { background: #fde8e8; color: #a03030; }
  .tag-folic { background: #e0f0f8; color: #2a5f88; }
  .tag-ovul  { background: #e0f4e0; color: #286628; }
  .tag-lut   { background: #f0e6f8; color: #6a3a88; }

  /* EXERCISE ITEM */
  .ex-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 8px; }
  .ex-name { font-size: 15px; font-weight: 600; }
  .ex-meta { font-size: 13px; color: var(--text2); margin-top: 4px; }

  /* SCORE DISPLAY */
  .score-ring { width: 72px; height: 72px; }
  .score-pair { display: flex; gap: 12px; }
  .score-card { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; text-align: center; }
  .score-num { font-size: 28px; font-weight: 700; }
  .score-label { font-size: 11px; color: var(--text3); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* PROGRESS CHARTS */
  .chart-container { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
  .chart-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
  .mini-chart { display: flex; align-items: flex-end; gap: 4px; height: 60px; }
  .bar { flex: 1; border-radius: 3px 3px 0 0; min-height: 4px; transition: height .3s; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; display: flex; align-items: flex-end; }
  .modal { background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; max-height: 92dvh; overflow-y: auto; padding: 20px 20px calc(20px + env(safe-area-inset-bottom, 0)); }
  .modal-handle { width: 40px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 16px; }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
  .hidden { display: none !important; }

  /* EXERCISE SELECTOR */
  .ex-select-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); gap: 12px; cursor: pointer; }
  .ex-select-item:last-child { border-bottom: none; }
  .ex-checkbox { width: 22px; height: 22px; border: 2px solid var(--border2); border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .ex-checkbox.checked { background: var(--accent-dark); border-color: var(--accent-dark); }

  /* HISTORY ITEM */
  .history-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; cursor: pointer; }
  .history-date { font-size: 13px; font-weight: 700; color: var(--text2); }
  .history-exs { font-size: 13px; color: var(--text3); margin-top: 4px; }

  /* LOAD INLINE FIELDS */
  .load-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; flex-wrap: wrap; }
  .load-input { flex: 1; min-width: 80px; padding: 8px 10px; font-size: 14px; }
  .load-label { font-size: 12px; color: var(--text3); white-space: nowrap; }

  /* STATS GRID */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
  .stat-val { font-size: 22px; font-weight: 700; }
  .stat-lbl { font-size: 12px; color: var(--text3); margin-top: 2px; }

  /* CHIP GROUP */
  .chip-group { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border2); font-size: 13px; cursor: pointer; background: var(--bg); color: var(--text2); }
  .chip.sel { background: var(--accent-dark); border-color: var(--accent-dark); color: white; }

  /* SEARCH */
  .search-input { position: relative; }
  .search-input input { padding-left: 36px; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }

  /* CYCLE PHASE INDICATOR */
  .phase-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }

  /* WEEKLY HEATMAP */
  .heatmap-row { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
  .heatmap-cell { width: 28px; height: 28px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 9px; color: var(--text3); }
  .heatmap-cell.has-data { background: var(--accent-bg); border-color: var(--accent); color: var(--accent-dark); font-weight: 600; }

  /* SCORE BAR */
  .score-bar-wrap { margin-top: 8px; background: var(--bg); border-radius: 4px; height: 6px; }
  .score-bar-fill { height: 6px; border-radius: 4px; background: var(--accent); }


  /* DRIVE SYNC */
  .sync-bar { display:flex; align-items:center; gap:8px; padding:10px 16px; background:var(--surface); border-bottom:1px solid var(--border); font-size:12px; color:var(--text3); }
  .sync-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .sync-dot.ok { background:var(--success); }
  .sync-dot.err { background:var(--danger); }
  .sync-dot.syncing { background:var(--accent); animation:pulse 1s infinite; }
  .sync-dot.off { background:var(--border2); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
  .flex-row { display: flex; align-items: center; gap: 8px; }
  .flex-col { display: flex; flex-direction: column; gap: 8px; }
  .mt-8 { margin-top: 8px; }
  .mt-16 { margin-top: 16px; }
  .text-sm { font-size: 13px; }
  .text-muted { color: var(--text3); }
  .font-bold { font-weight: 700; }
  .text-accent { color: var(--accent-dark); }

  /* SPARKLINE */
  .sparkline { width: 100%; height: 48px; }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text3); }
  .empty-state svg { margin: 0 auto 12px; display: block; opacity: .4; }
  .empty-state p { font-size: 14px; }

  /* NOTIFICATION */
  #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #1a1612; color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 500; z-index: 999; opacity: 0; transition: opacity .2s; pointer-events: none; white-space: nowrap; }
  #toast.show { opacity: 1; }
</style>
</head>
<body>
<div id="app">
  <div id="sync-bar" class="sync-bar hidden"><div class="sync-dot off" id="sync-dot"></div><span id="sync-msg">Google Drive desconectado</span><button id="sync-btn" style="margin-left:auto;background:none;border:none;font-size:12px;color:var(--accent-dark);cursor:pointer;padding:0;" onclick="handleSyncBtn()"></button></div>
  <div id="content"></div>
  <nav id="nav">
    <button class="nav-btn active" onclick="navigate('home')" id="nav-home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      Inicio
    </button>
    <button class="nav-btn" onclick="navigate('log')" id="nav-log">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Registrar
    </button>
    <button class="nav-btn" onclick="navigate('progress')" id="nav-progress">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Progreso
    </button>
    <button class="nav-btn" onclick="navigate('exercises')" id="nav-exercises">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6.5 6.5h11v11h-11z"/><path d="M3 9.5h3v5H3z"/><path d="M18 9.5h3v5h-3z"/><path d="M9.5 3h5v3h-5z"/><path d="M9.5 18h5v3h-5z"/></svg>
      Ejercicios
    </button>
    <button class="nav-btn" onclick="navigate('settings')" id="nav-settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      Ajustes
    </button>
  </nav>
</div>

<div id="modal-overlay" class="modal-overlay hidden" onclick="closeModalOnOverlay(event)">
  <div class="modal" id="modal-content"></div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════
// DATA STORE
// ═══════════════════════════════════════════════
const DB = {
  get exercises() { return JSON.parse(localStorage.getItem('exercises') || '[]'); },
  set exercises(v) { localStorage.setItem('exercises', JSON.stringify(v)); },
  get sessions() { return JSON.parse(localStorage.getItem('sessions') || '[]'); },
  set sessions(v) { localStorage.setItem('sessions', JSON.stringify(v)); },
};

// Seed default exercises from the user's excel
if (!localStorage.getItem('exercises')) {
  const defaults = [
    "Apertura de cadera miniband","Boxeo al aire","Curl de bíceps","Curl de bíceps martillo con goma",
    "Desplazamiento lateral tocando tibias","Elevaciones laterales","Flexiones inclinadas","Jumping Jacks",
    "Pallof press de rodillas mano colateral isotónico","Pasos laterales con miniband","Plancha",
    "Plancha lateral isométrica","Peso muerto rumano con kettle/barra","Peso muerto a una pierna con mochila",
    "Press de banca mancuernas","Press banca inclinado con dos mancuernas","Press francés banco con mancuernas",
    "Press militar","Press de tríceps bilateral","Press vertical de hombros con mochila",
    "Puente de glúteo con pesa rusa","Puente de glúteo unilateral KB","Puente de isquios isométrico",
    "Pull over bicho muerto","Remo a una mano con mancuerna","Remo a una mano sentado (goma)",
    "Remo con goma","Remo con goma a una mano","Remo a una mano con mochila",
    "Sentadilla box pie quebrado goblet","Sentadilla box con extensión de brazos","Sentadilla box goblet",
    "Sentadilla goblet","Sentadilla isométrica en pared","Sentadilla sumo KB","Sentadilla + subida de rodilla",
    "Skipping","Mini zancadas con extensión vertical de brazos","Zancadas en pared","Zancada frontal con mancuernas"
  ];
  DB.exercises = defaults.map((n,i) => ({ id: 'ex_' + i, name: n }));
}

// ═══════════════════════════════════════════════
// ROUTING
// ═══════════════════════════════════════════════
let currentPage = 'home';
function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const navEl = document.getElementById('nav-' + page);
  if (navEl) navEl.classList.add('active');
  render();
}

function render() {
  const c = document.getElementById('content');
  if (currentPage === 'home') c.innerHTML = renderHome();
  else if (currentPage === 'log') c.innerHTML = renderLog();
  else if (currentPage === 'progress') c.innerHTML = renderProgress();
  else if (currentPage === 'exercises') c.innerHTML = renderExercises();
  else if (currentPage === 'settings') c.innerHTML = renderSettings();
  else if (currentPage === 'live') c.innerHTML = renderLive();
  attachListeners();
}

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function formatDate(d) {
  const date = new Date(d);
  return date.toLocaleDateString('es-ES', { weekday: 'short', day: 'numeric', month: 'short' });
}
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function cycleTag(phase) {
  const map = { 'Menstruación': ['tag-menst','🔴'], 'Folicular': ['tag-folic','🔵'], 'Ovulación': ['tag-ovul','🟢'], 'Lútea': ['tag-lut','🟣'] };
  const [cls, _] = map[phase] || ['',''];
  return `<span class="tag ${cls}">${phase}</span>`;
}
function phaseExpectedScore(phase) {
  // Expected baseline performance by phase
  return { 'Folicular': 0.85, 'Ovulación': 1.0, 'Lútea': 0.65, 'Menstruación': 0.55 }[phase] || 0.75;
}
function calcScores(session) {
  // Absolute score: weighted avg of all available context fields
  const sw = getSettings().score_weights;
  const weights = { sleep: sw.sleep, energy: sw.energy, stress_inv: sw.stress, motivation: sw.motivation, soreness_inv: sw.soreness };
  let total = 0, wsum = 0;
  const push = (val, key, max) => { if (val != null && val !== '' && val !== 0) { total += (val/max) * weights[key]; wsum += weights[key]; } };
  push(session.sleep, 'sleep', 5);
  push(session.energy, 'energy', 5);
  push(session.stress != null ? 6 - session.stress : null, 'stress_inv', 5);
  push(session.motivation, 'motivation', 5);
  push(session.soreness != null ? 6 - session.soreness : null, 'soreness_inv', 5);
  // Add exercise load contribution
  let loadScore = 0, loadCount = 0;
  (session.exercises || []).forEach(ex => {
    if (ex.rpe != null && ex.rpe !== '') { loadScore += ex.rpe / 10; loadCount++; }
  });
  if (loadCount > 0) { total += (loadScore/loadCount) * sw.rpe; wsum += sw.rpe; }
  const absolute = wsum > 0 ? Math.round((total/wsum) * 100) : null;
  // Relative score: adjust by cycle phase expectation
  if (absolute === null) return { absolute: null, relative: null };
  const expected = phaseExpectedScore(session.cycle) * 100;
  const relative = Math.min(100, Math.round(absolute / (expected / 100) * 0.7 + absolute * 0.3));
  return { absolute, relative };
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
function uid() { return 'id_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }

// ═══════════════════════════════════════════════
// HOME PAGE
// ═══════════════════════════════════════════════
function renderHome() {
  const sessions = DB.sessions.sort((a,b) => b.date.localeCompare(a.date));
  const recent = sessions.slice(0, 5);
  const today = todayStr();
  const todaySess = sessions.find(s => s.date === today);

  // Streak
  let streak = 0;
  const dates = new Set(sessions.map(s => s.date));
  let d = new Date(); d.setDate(d.getDate() - (todaySess ? 0 : 1));
  while (dates.has(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`)) {
    streak++; d.setDate(d.getDate()-1);
  }

  // This week
  const weekStart = new Date(); weekStart.setDate(weekStart.getDate() - weekStart.getDay() + 1);
  const weekSess = sessions.filter(s => new Date(s.date) >= weekStart).length;

  const banners = getSmartBanner();
  const stagnated = getStagnatedExercises();

  return `
  <div class="page-header">
    <h1>Hola 👋</h1>
    <p>${new Date().toLocaleDateString('es-ES', { weekday:'long', day:'numeric', month:'long' })}</p>
  </div>

  ${banners ? banners.map(b => `
  <div class="section" style="padding-bottom:0;">
    <div class="card" style="border-color:${b.border};background:${b.color};cursor:${b.action?'pointer':'default'};" onclick="${b.action||''}">
      <div style="font-size:13px;font-weight:600;color:${b.textColor};">${b.msg}</div>
      ${b.sub ? `<div style="font-size:12px;color:${b.textColor};opacity:.8;margin-top:2px;">${b.sub}</div>` : ''}
    </div>
  </div>`).join('') : ''}

  ${stagnated.length > 0 ? `
  <div class="section" style="padding-bottom:0;">
    <div class="card" style="border-color:var(--danger);background:var(--danger-bg);cursor:pointer;" onclick="progressTab='exercise';navigate('progress');">
      <div style="font-size:13px;font-weight:700;color:var(--danger);margin-bottom:4px;">
        ⚠ ${stagnated.length} ejercicio${stagnated.length>1?'s':''} estancado${stagnated.length>1?'s':''}
      </div>
      <div style="font-size:12px;color:var(--danger);opacity:.85;">${stagnated.slice(0,2).map(e=>e.name).join(', ')}${stagnated.length>2?' y '+(stagnated.length-2)+' más':''}</div>
    </div>
  </div>` : ''}

// ANALYSIS ENGINE
// ═══════════════════════════════════════════════

// ── Stagnation detection ──────────────────────
function getStagnatedExercises() {
  const sessions = DB.sessions.sort((a,b) => a.date.localeCompare(b.date));
  const threshold = (getSettings().stagnation_sessions || 5);
  const exMap = {}; // exId -> [{date, kg, resist_used, reps_num, rpe}]

  sessions.forEach(s => {
    (s.exercises||[]).forEach(ex => {
      if (!exMap[ex.id]) exMap[ex.id] = [];
      // Extract numeric reps
      const repsNum = ex.reps ? parseFloat(ex.reps) || null : null;
      exMap[ex.id].push({ date: s.date, kg: ex.kg||null, resist: ex.resist_used||null, reps: repsNum, rpe: ex.rpe||null, name: ex.name });
    });
  });

  const stagnated = [];
  const exLookup = {};
  DB.exercises.forEach(e => { exLookup[e.id] = e; });

  Object.entries(exMap).forEach(([id, history]) => {
    if (history.length < threshold) return;
    if (exLookup[id] && exLookup[id].trackStagnation === false) return;
    const recent = history.slice(-threshold);
    // Check if ANY metric improved across the window
    const first = recent[0];
    const hasProgress = recent.slice(1).some(r => {
      const kgProg    = r.kg   && first.kg   && r.kg   > first.kg;
      const resistProg= r.resist && first.resist && r.resist > first.resist;
      const repsProg  = r.reps && first.reps && r.reps > first.reps;
      const rpeProg   = r.rpe  && first.rpe  && r.rpe  < first.rpe; // lower RPE = easier = progress
      return kgProg || resistProg || repsProg || rpeProg;
    });
    if (!hasProgress) {
      stagnated.push({ id, name: recent[0].name, sessions: history.length, recentSessions: threshold,
        lastKg: recent[recent.length-1].kg, lastResist: recent[recent.length-1].resist });
    }
  });
  return stagnated;
}

// ── Volume calculation ─────────────────────────
function calcSessionVolume(session) {
  // Volume = sum of (sets × reps_num) across exercises with numeric reps
  let vol = 0;
  (session.exercises||[]).forEach(ex => {
    const sets = ex.sets || 0;
    const reps = parseFloat(ex.reps) || 0;
    if (sets && reps) vol += sets * reps;
  });
  return vol || null;
}

function calcSessionLoad(session) {
  // Weighted load = sum of (sets × reps × kg) for exercises with kg
  let load = 0, count = 0;
  (session.exercises||[]).forEach(ex => {
    const sets = ex.sets || 0;
    const reps = parseFloat(ex.reps) || 0;
    const kg   = ex.kg || 0;
    if (sets && reps && kg) { load += sets * reps * kg; count++; }
  });
  return count > 0 ? Math.round(load) : null;
}

// ── Correlations ───────────────────────────────
function computeCorrelations() {
  const sessions = DB.sessions.filter(s =>
    s.energy != null || s.sleep != null || s.stress != null || s.motivation != null || s.soreness != null
  );
  if (sessions.length < 6) return [];

  const insights = [];

  // Helper: mean of array
  const mean = arr => arr.reduce((a,b)=>a+b,0)/arr.length;

  // ── 1. Performance by cycle phase ──
  const phases = ['Menstruación','Folicular','Ovulación','Lútea'];
  const phaseScores = {};
  phases.forEach(p => {
    const sc = sessions.filter(s=>s.cycle===p).map(s=>calcScores(s).absolute).filter(v=>v!=null&&v>0);
    if (sc.length >= 2) phaseScores[p] = { avg: Math.round(mean(sc)), n: sc.length };
  });
  if (Object.keys(phaseScores).length >= 2) {
    const sorted = Object.entries(phaseScores).sort((a,b)=>b[1].avg-a[1].avg);
    const best = sorted[0], worst = sorted[sorted.length-1];
    const diff = best[1].avg - worst[1].avg;
    if (diff >= 5) {
      insights.push({
        type: 'cycle',
        icon: '🔄',
        title: 'Rendimiento por fase',
        text: `Rindes un ${diff} puntos mejor en fase ${best[0]} (media ${best[1].avg}) que en ${worst[0]} (media ${worst[1].avg}).`,
        detail: sorted.map(([p,d])=>`${p}: ${d.avg} pts (${d.n} entrenos)`).join(' · ')
      });
    }
  }

  // ── 2. Sleep vs score ──
  const sleepData = sessions.filter(s=>s.sleep!=null&&s.sleep>0).map(s=>({ sleep:s.sleep, score: calcScores(s).absolute })).filter(d=>d.score!=null);
  if (sleepData.length >= 6) {
    const lowSleep  = sleepData.filter(d=>d.sleep<=2).map(d=>d.score);
    const highSleep = sleepData.filter(d=>d.sleep>=4).map(d=>d.score);
    if (lowSleep.length >= 2 && highSleep.length >= 2) {
      const diff = Math.round(mean(highSleep) - mean(lowSleep));
      if (Math.abs(diff) >= 5) {
        insights.push({
          type: 'sleep',
          icon: '😴',
          title: 'Sueño y rendimiento',
          text: `Con sueño ≥4 tu puntuación media es ${diff} puntos más alta que con sueño ≤2.`,
          detail: `Sueño bajo (≤2): media ${Math.round(mean(lowSleep))} · Sueño alto (≥4): media ${Math.round(mean(highSleep))}`
        });
      }
    }
  }

  // ── 3. Stress vs score ──
  const stressData = sessions.filter(s=>s.stress!=null&&s.stress>0).map(s=>({ stress:s.stress, score: calcScores(s).absolute })).filter(d=>d.score!=null);
  if (stressData.length >= 6) {
    const highStress = stressData.filter(d=>d.stress>=4).map(d=>d.score);
    const lowStress  = stressData.filter(d=>d.stress<=2).map(d=>d.score);
    if (highStress.length >= 2 && lowStress.length >= 2) {
      const diff = Math.round(mean(lowStress) - mean(highStress));
      if (diff >= 5) {
        insights.push({
          type: 'stress',
          icon: '⚡',
          title: 'Estrés y rendimiento',
          text: `Con estrés alto (≥4) tu puntuación baja de media ${diff} puntos respecto a días de bajo estrés.`,
          detail: `Estrés bajo (≤2): ${Math.round(mean(lowStress))} pts · Estrés alto (≥4): ${Math.round(mean(highStress))} pts`
        });
      }
    }
  }

  // ── 4. Energy vs volume ──
  const energyVol = sessions.filter(s=>s.energy!=null&&s.energy>0).map(s=>({ energy:s.energy, vol: calcSessionVolume(s) })).filter(d=>d.vol!=null&&d.vol>0);
  if (energyVol.length >= 6) {
    const lowE  = energyVol.filter(d=>d.energy<=2).map(d=>d.vol);
    const highE = energyVol.filter(d=>d.energy>=4).map(d=>d.vol);
    if (lowE.length >= 2 && highE.length >= 2) {
      const pct = Math.round((mean(highE)-mean(lowE))/mean(lowE)*100);
      if (pct >= 10) {
        insights.push({
          type: 'energy',
          icon: '💪',
          title: 'Energía y volumen',
          text: `Con energía alta (≥4) haces un ${pct}% más de volumen (series×reps) que con energía baja.`,
          detail: `Energía baja (≤2): ${Math.round(mean(lowE))} reps totales · Alta (≥4): ${Math.round(mean(highE))} reps totales`
        });
      }
    }
  }

  // ── 5. Days since last session vs score ──
  const sortedSess = [...sessions].sort((a,b)=>a.date.localeCompare(b.date));
  const restData = [];
  for (let i=1; i<sortedSess.length; i++) {
    const days = Math.round((new Date(sortedSess[i].date)-new Date(sortedSess[i-1].date))/(1000*86400));
    const score = calcScores(sortedSess[i]).absolute;
    if (score != null && days >= 1 && days <= 7) restData.push({ days, score });
  }
  if (restData.length >= 6) {
    const shortRest = restData.filter(d=>d.days===1).map(d=>d.score);
    const longRest  = restData.filter(d=>d.days>=2).map(d=>d.score);
    if (shortRest.length >= 3 && longRest.length >= 3) {
      const diff = Math.round(mean(longRest)-mean(shortRest));
      if (Math.abs(diff) >= 5) {
        const better = diff > 0 ? 'con más descanso' : 'entrenando días consecutivos';
        insights.push({
          type: 'rest',
          icon: '🔋',
          title: 'Descanso entre sesiones',
          text: `Rindes ${Math.abs(diff)} puntos mejor ${better}.`,
          detail: `Descanso 1 día: ${Math.round(mean(shortRest))} pts · 2+ días: ${Math.round(mean(longRest))} pts`
        });
      }
    }
  }

  // ── 6. Soreness vs next session score ──
  const sorenessImpact = [];
  for (let i=0; i<sortedSess.length-1; i++) {
    if (sortedSess[i].soreness != null && sortedSess[i].soreness > 0) {
      const nextScore = calcScores(sortedSess[i+1]).absolute;
      if (nextScore != null) sorenessImpact.push({ soreness: sortedSess[i].soreness, nextScore });
    }
  }
  if (sorenessImpact.length >= 6) {
    const highSore = sorenessImpact.filter(d=>d.soreness>=4).map(d=>d.nextScore);
    const lowSore  = sorenessImpact.filter(d=>d.soreness<=2).map(d=>d.nextScore);
    if (highSore.length >= 2 && lowSore.length >= 2) {
      const diff = Math.round(mean(lowSore)-mean(highSore));
      if (diff >= 5) {
        insights.push({
          type: 'soreness',
          icon: '🤕',
          title: 'Agujetas y siguiente sesión',
          text: `Cuando tienes agujetas altas (≥4), la sesión siguiente puntúa ${diff} puntos menos de media.`,
          detail: `Con agujetas bajas: ${Math.round(mean(lowSore))} pts · Con agujetas altas: ${Math.round(mean(highSore))} pts`
        });
      }
    }
  }

  return insights;
}

// ── Smart reminder banner ──────────────────────
function getSmartBanner() {
  const sessions = DB.sessions.sort((a,b) => b.date.localeCompare(a.date));
  const today = todayStr();
  const todaySess = sessions.find(s => s.date === today);
  if (todaySess) return null; // Already trained today

  // Days since last session
  const lastDate = sessions[0]?.date;
  let daysSince = null;
  if (lastDate) {
    daysSince = Math.round((new Date(today) - new Date(lastDate)) / 86400000);
  }

  // Current cycle phase from last session
  const lastCycle = sessions[0]?.cycle || null;
  const phaseAdvice = {
    'Ovulación': { msg: 'Estás en fase ovulatoria — tu mejor momento para intensidad alta.', color: 'var(--cycle-ovul)', textColor: '#286628' },
    'Folicular': { msg: 'Fase folicular: energía en ascenso, buen momento para progresar en cargas.', color: 'var(--cycle-folic)', textColor: '#2a5f88' },
    'Lútea': { msg: 'Fase lútea: escucha a tu cuerpo, ajusta la intensidad según cómo estés.', color: 'var(--cycle-lut)', textColor: '#6a3a88' },
    'Menstruación': { msg: 'Fase menstrual: movilidad y ejercicio suave si te apetece.', color: 'var(--cycle-menst)', textColor: '#a03030' }
  };

  const banners = [];

  if (daysSince !== null && daysSince >= 3) {
    banners.push({
      msg: `Llevas ${daysSince} día${daysSince>1?'s':''} sin registrar un entreno.`,
      sub: 'Pulsa para registrar hoy.',
      color: 'var(--accent-bg)', border: 'var(--accent)', textColor: 'var(--accent-dark)',
      action: "navigate('log')"
    });
  }

  if (lastCycle && phaseAdvice[lastCycle]) {
    const pa = phaseAdvice[lastCycle];
    banners.push({
      msg: pa.msg, sub: null,
      color: pa.color + '22', border: pa.color, textColor: pa.textColor,
      action: "progressTab='cycle';navigate('progress')"
    });
  }

  return banners.length > 0 ? banners : null;
}

function renderProgressGeneral(allSessions) {
  if (allSessions.length === 0) return `<div class="empty-state"><p>Sin datos aún</p></div>`;

  // Date filter
  let sessions = allSessions;
  if (progressDateFrom) sessions = sessions.filter(s => s.date >= progressDateFrom);
  if (progressDateTo)   sessions = sessions.filter(s => s.date <= progressDateTo);
  if (sessions.length === 0) return `
    ${renderDateFilter()}
    <div class="empty-state"><p>Sin entrenos en ese periodo</p></div>`;

  const scores = sessions.map(s => calcScores(s));
  const absScores = scores.map(s => s.absolute).filter(v => v !== null);
  const relScores = scores.map(s => s.relative).filter(v => v !== null);
  const avgAbs = absScores.length ? Math.round(absScores.reduce((a,b)=>a+b,0)/absScores.length) : null;
  const avgRel = relScores.length ? Math.round(relScores.reduce((a,b)=>a+b,0)/relScores.length) : null;

  // Weeks
  const weekMap = {};
  sessions.forEach(s => {
    const d = new Date(s.date);
    const week = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-W' + Math.ceil(d.getDate()/7);
    weekMap[week] = (weekMap[week]||0)+1;
  });
  const weekKeys = Object.keys(weekMap).sort();
  const weekCounts = weekKeys.map(k => weekMap[k]);
  const maxW = Math.max(...weekCounts, 1);

  // Bienestar avgs
  const bioKeys = ['sleep','energy','stress','motivation','soreness'];
  const bioAvgs = {};
  bioKeys.forEach(k => {
    const vals = sessions.map(s=>s[k]).filter(v=>v!=null&&v!==0);
    bioAvgs[k] = vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1) : '-';
  });

  // Score explanation for a representative session
  const sw = getSettings().score_weights;

  return `
  ${renderDateFilter()}

  ${avgAbs !== null ? `
  <div class="score-pair" style="margin-bottom:16px;">
    <div class="score-card" style="cursor:pointer;" onclick="showScoreExplanation()">
      <div class="score-num" style="color:var(--accent-dark)">${avgAbs}</div>
      <div class="score-label">Calidad absoluta <span style="color:var(--accent);font-size:10px;">ℹ</span></div>
      <div class="score-bar-wrap"><div class="score-bar-fill" style="width:${avgAbs}%"></div></div>
    </div>
    <div class="score-card" style="cursor:pointer;" onclick="showScoreExplanation()">
      <div class="score-num" style="color:var(--success)">${avgRel}</div>
      <div class="score-label">Calidad relativa <span style="color:var(--success);font-size:10px;">ℹ</span></div>
      <div class="score-bar-wrap"><div class="score-bar-fill" style="width:${avgRel}%;background:var(--success)"></div></div>
    </div>
  </div>` : ''}

  <div class="chart-container">
    <div class="flex-row" style="justify-content:space-between;margin-bottom:8px;">
      <div class="chart-title" style="margin:0;">Entrenos por semana</div>
      <span class="text-sm text-muted">${sessions.length} total</span>
    </div>
    <div class="mini-chart">
      ${weekCounts.map((v,i)=>`<div class="bar" title="${weekKeys[i]}: ${v}" style="height:${Math.round((v/maxW)*100)}%;background:var(--accent);"></div>`).join('')}
    </div>
    <div class="flex-row" style="justify-content:space-between;margin-top:4px;">
      <span style="font-size:10px;color:var(--text3);">${weekKeys[0]||''}</span>
      <span style="font-size:10px;color:var(--text3);">${weekKeys[weekKeys.length-1]||''}</span>
    </div>
  </div>

  <div class="chart-container">
    <div class="chart-title">Bienestar promedio</div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      ${[['Sueño','sleep'],['Energía','energy'],['Estrés','stress'],['Motivación','motivation'],['Agujetas','soreness']].map(([lbl,key])=>`
        <div>

  </div>

  ${absScores.length > 1 ? `

  </div>

  ${kgData.length > 1 ? `

    <div class="chart-title">Progresión de carga (kg)</div>
    <div class="mini-chart">
      ${kgData.map(v=>`<div class="bar" style="height:${Math.round((v/Math.max(...kgData))*100)}%;background:var(--accent-dark);"></div>`).join('')}

  <div class="section-title" style="margin-top:8px;">Historial</div>

    <div class="ex-item">
      <div class="flex-row" style="justify-content:space-between;">
        <span class="text-sm font-bold">${formatDate(s.date)}</span>
        <span class="text-sm text-muted">${[s.exData.sets && s.exData.sets+'x', s.exData.reps, s.exData.kg && s.exData.kg+'kg', s.exData.rpe && 'RPE '+s.exData.rpe].filter(Boolean).join(' · ')}</span>

function renderProgressCycle(sessions) {
  const phases = ['Menstruación','Folicular','Ovulación','Lútea'];
  const phaseColors = { 'Menstruación': 'var(--cycle-menst)', 'Folicular': 'var(--cycle-folic)', 'Ovulación': 'var(--cycle-ovul)', 'Lútea': 'var(--cycle-lut)' };
  const phaseData = {};
  phases.forEach(p => {
    const pSess = sessions.filter(s=>s.cycle===p);
    const scores = pSess.map(s=>calcScores(s));
    const abs = scores.map(s=>s.absolute).filter(v=>v!==null);
    const bio = { sleep:[], energy:[], stress:[], motivation:[], soreness:[] };
    pSess.forEach(s => { Object.keys(bio).forEach(k => { if(s[k]!=null&&s[k]!==0) bio[k].push(s[k]); }); });
    phaseData[p] = {
      count: pSess.length,
      avgAbs: abs.length ? Math.round(abs.reduce((a,b)=>a+b,0)/abs.length) : null,
      avgSleep: bio.sleep.length ? (bio.sleep.reduce((a,b)=>a+b,0)/bio.sleep.length).toFixed(1) : null,
      avgEnergy: bio.energy.length ? (bio.energy.reduce((a,b)=>a+b,0)/bio.energy.length).toFixed(1) : null,
      avgStress: bio.stress.length ? (bio.stress.reduce((a,b)=>a+b,0)/bio.stress.length).toFixed(1) : null,
    };
  });

  if (sessions.length === 0) return `<div class="empty-state"><p>Sin datos aún</p></div>`;

  return `
  <div class="chart-container" style="margin-bottom:12px;">
    <div class="chart-title">Calidad media por fase del ciclo</div>

function renderProgressInsights(sessions) {
  const insights = computeCorrelations();
  const stagnated = getStagnatedExercises();

  // Volume trend (last 12 sessions with volume data)
  const volSessions = sessions.filter(s => calcSessionVolume(s) != null).slice(-12);
  const loadSessions = sessions.filter(s => calcSessionLoad(s) != null).slice(-12);
  const volData  = volSessions.map(s => calcSessionVolume(s));
  const loadData = loadSessions.map(s => calcSessionLoad(s));
  const maxVol  = volData.length  ? Math.max(...volData)  : 1;
  const maxLoad = loadData.length ? Math.max(...loadData) : 1;

  return `
  <!-- STAGNATION -->
  ${stagnated.length > 0 ? `
  <div class="chart-container" style="margin-bottom:12px;">
    <div class="chart-title" style="color:var(--danger);">⚠ Estancamiento detectado</div>
    <p class="text-sm text-muted" style="margin-bottom:10px;">Sin progreso en las últimas ${getSettings().stagnation_sessions||5} sesiones.</p>
    ${stagnated.map(ex => `
      <div class="ex-item" style="cursor:pointer;" onclick="selectedExercise='${ex.id}';progressTab='exercise';render();">
        <div class="flex-row" style="justify-content:space-between;">
          <span class="ex-name" style="color:var(--danger);">${ex.name}</span>
          <span class="text-sm text-muted">${ex.sessions} sesiones →</span>
        </div>
        <div class="text-sm text-muted mt-8">${[ex.lastKg?ex.lastKg+'kg':null, ex.lastResist?'resist '+ex.lastResist:null].filter(Boolean).join(' · ')||'Sin métricas numéricas'}</div>
      </div>
    `).join('')}
  </div>` : `
  <div class="card" style="margin-bottom:12px;border-color:var(--success);background:var(--success-bg);">
    <div style="font-size:13px;font-weight:600;color:var(--success);">✓ Sin estancamientos detectados</div>
  </div>`}

  <!-- VOLUME TREND -->
  ${volData.length > 1 ? `
  <div class="chart-container" style="margin-bottom:12px;">
    <div class="chart-title">Tendencia de volumen (series × reps)</div>
    <div class="mini-chart" style="margin-bottom:8px;">
      ${volData.map((v,i) => `<div class="bar" style="height:${Math.round((v/maxVol)*100)}%;background:var(--accent);"></div>`).join('')}
    </div>
    <div class="flex-row" style="justify-content:space-between;">
      <span class="text-sm text-muted">${volData[0]} reps</span>
      <span class="text-sm font-bold ${volData[volData.length-1]>volData[0]?'text-accent':''}">${volData[volData.length-1]>volData[0]?'↑':'→'} ${volData[volData.length-1]} reps</span>
    </div>
  </div>` : ''}

  ${loadData.length > 1 ? `
  <div class="chart-container" style="margin-bottom:12px;">
    <div class="chart-title">Tendencia de carga total (series × reps × kg)</div>
    <div class="mini-chart" style="margin-bottom:8px;">
      ${loadData.map(v => `<div class="bar" style="height:${Math.round((v/maxLoad)*100)}%;background:var(--cycle-folic);"></div>`).join('')}
    </div>
    <div class="flex-row" style="justify-content:space-between;">
      <span class="text-sm text-muted">${loadData[0]} kg·reps</span>
      <span class="text-sm font-bold" style="color:var(--cycle-folic);">${loadData[loadData.length-1]>loadData[0]?'↑':'→'} ${loadData[loadData.length-1]} kg·reps</span>
    </div>
  </div>` : ''}

  <!-- CORRELATIONS -->
  <div class="section-title" style="margin-bottom:10px;">Correlaciones</div>
  ${insights.length === 0 ? `
  <div class="card">
    <div class="text-sm text-muted">Necesitas al menos 6 sesiones con datos de bienestar para generar insights. Sigue registrando.</div>
  </div>` :
    insights.map(ins => `
  <div class="chart-container" style="margin-bottom:10px;">
    <div class="flex-row" style="margin-bottom:6px;">
      <span style="font-size:18px;margin-right:8px;">${ins.icon}</span>
      <span style="font-size:14px;font-weight:700;">${ins.title}</span>
    </div>
    <p class="text-sm" style="color:var(--text);margin-bottom:6px;line-height:1.5;">${ins.text}</p>
    <p class="text-sm text-muted" style="line-height:1.4;">${ins.detail}</p>
  </div>`).join('')
  }`;
}

function copySessionText(id) {
  const session = DB.sessions.find(s => s.id === id);
  if (!session) return;

  const lines = [];

  // Bienestar
  if (session.energy  != null) lines.push(`🔋Energía (1-5): ${session.energy}`);
  if (session.stress  != null) lines.push(`🧘‍♀️Estrés (1-5): ${session.stress}`);
  if (session.sleep   != null) lines.push(`💤Sueño (1-5): ${session.sleep}`);
  if (session.motivation != null) lines.push(`💪Motivación (1-5): ${session.motivation}`);
  if (session.soreness   != null) lines.push(`🤕Agujetas (1-5): ${session.soreness}`);

  // Exercises
  if (session.exercises?.length > 0) {
    lines.push('');
    session.exercises.forEach(ex => {
      // Build load string
      const load = [
        ex.kg ? (ex.material === 'Mancuerna' ? ex.kg + 'kg/m' : ex.kg + 'kg') : null,
        ex.resist_used && ex.resist_max ? ex.resist_used + '/' + ex.resist_max : null,
      ].filter(Boolean).join(', ');

      const loadPart = load ? ` (${load})` : '';
      const notesPart = ex.notes ? `: ${ex.notes}` : '';
      lines.push(`- ${ex.name}${loadPart}${notesPart}`);
    });
  }

  const text = lines.join('\n');
  navigator.clipboard.writeText(text)
    .then(() => toast('Copiado al portapapeles ✓'))
    .catch(() => {
      // Fallback for older Safari
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      toast('Copiado ✓');
    });
}

let liveState = null; // setup phase
let liveSession = null; // active workout

function startLiveSetup() {
  liveState = {

function renderLive() {

}

function saveBlock(bi) {

  else liveState.blocks[bi] = window._editBlock;

// ── EXECUTION ─────────────────────────────────
function startLiveExecution() {
  if (!liveState.cycle) { toast('Selecciona la fase del ciclo'); return; }
  liveSession = {
    startTime: Date.now(),
    blockIndex: 0,
    roundIndex: 0, // current round (0-based)
    exIndex: 0,    // for individual: current exercise series index (same as round)
    // per-exercise results: { exId+blockIdx: {rpe, notes, kg, resist_used, resist_max} }
    results: {},
    // completed blocks
    done: false
  };
  render();
}

function renderLiveExecution() {
  if (liveSession.done) return renderLiveFinish();
  const blocks = liveState.blocks;
  const bi = liveSession.blockIndex;
  if (bi >= blocks.length) { liveSession.done = true; return renderLiveFinish(); }
  const block = blocks[bi];
  const totalRounds = block.rounds;
  const currentRound = liveSession.roundIndex; // 0-based

  const elapsed = Math.floor((Date.now() - liveSession.startTime) / 1000);
  const elapsedMin = Math.floor(elapsed/60);
  const elapsedSec = String(elapsed%60).padStart(2,'0');

  return `
  <div style="background:var(--accent-dark);color:white;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;">
    <div>
      <div style="font-size:11px;opacity:.7;text-transform:uppercase;letter-spacing:.5px;">Bloque ${bi+1} de ${blocks.length}</div>
      <div style="font-size:16px;font-weight:700;margin-top:2px;">${block.name || ({ individual:'Individual', superserie:'Superserie', ronda:'Ronda' }[block.type])}</div>
    </div>
    <div style="text-align:right;">
      <div style="font-size:11px;opacity:.7;">Tiempo</div>
      <div style="font-size:18px;font-weight:700;" id="live-timer-display">${elapsedMin}:${elapsedSec}</div>
    </div>
  </div>

  <div style="padding:16px;">
    <!-- Round progress -->
    <div style="display:flex;gap:6px;margin-bottom:16px;">
      ${Array.from({length:totalRounds},(_,i)=>`
        <div style="flex:1;height:6px;border-radius:3px;background:${i<currentRound?'var(--accent-dark)':i===currentRound?'var(--accent)':'var(--border)'};"></div>
      `).join('')}
    </div>
    <div class="text-sm text-muted" style="margin-bottom:16px;text-align:center;">
      ${block.type==='individual' ? `Serie ${currentRound+1} de ${totalRounds}` : `Ronda ${currentRound+1} de ${totalRounds}`}
    </div>

    <!-- Exercises in this block -->
    ${block.exercises.map((ex, ei) => {
      const resultKey = `${bi}_${ei}`;
      const res = liveSession.results[resultKey] || {};
      return `
      <div class="card" style="margin-bottom:12px;">
        <div style="font-size:16px;font-weight:700;margin-bottom:8px;">${ex.name}</div>
        <div class="text-sm text-muted" style="margin-bottom:10px;">${ex.timeSeconds ? ex.timeSeconds+'s' : ex.reps||''} ${ex.material?'· '+ex.material:''}</div>
        ${ex.timeSeconds ? `
        <button class="btn btn-full" onclick="startExTimer(${ex.timeSeconds})" style="margin-bottom:8px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Iniciar timer (${ex.timeSeconds}s)
        </button>` : ''}
      </div>`;
    }).join('')}

    <!-- Action buttons -->
    <button class="btn btn-primary btn-full" style="padding:14px;font-size:15px;margin-bottom:10px;" onclick="completeRound(${bi}, ${currentRound})">
      ✓ ${block.type==='individual' ? 'Serie completada' : 'Ronda completada'}
    </button>
    ${bi > 0 || currentRound > 0 ? `
    <button class="btn btn-full btn-sm" style="color:var(--text3);" onclick="finishWorkout()">Finalizar entreno</button>` : ''}
  </div>`;
}

// Elapsed timer update
setInterval(() => {
  if (!liveSession || liveSession.done) return;
  const elapsed = Math.floor((Date.now() - liveSession.startTime) / 1000);
  const el = document.getElementById('live-timer-display');
  if (el) el.textContent = Math.floor(elapsed/60) + ':' + String(elapsed%60).padStart(2,'0');
}, 1000);

// ── Timer ─────────────────────────────────────
let _timerInterval = null;
function startExTimer(seconds) {
  if (_timerInterval) { clearInterval(_timerInterval); _timerInterval = null; }
  // 10s prep
  let prep = 10;
  openModal(`
    <div class="modal-handle"></div>
    <div style="text-align:center;padding:20px 0;">
      <div style="font-size:14px;color:var(--text2);margin-bottom:8px;">Preparación</div>
      <div id="timer-count" style="font-size:72px;font-weight:700;color:var(--accent-dark);line-height:1;">${prep}</div>
      <div style="font-size:14px;color:var(--text3);margin-top:8px;">segundos</div>
    </div>
    <button class="btn btn-full" onclick="cancelTimer()">Cancelar</button>
  `);
  const beep = (freq, dur) => {
    try {
      const ctx = new (window.AudioContext||window.webkitAudioContext)();
      const o = ctx.createOscillator(); const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = freq; o.type = 'sine';
      g.gain.setValueAtTime(0.3, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      o.start(ctx.currentTime); o.stop(ctx.currentTime + dur);
    } catch(e) {}
  };
  _timerInterval = setInterval(() => {
    prep--;
    const el = document.getElementById('timer-count');
    if (!el) { clearInterval(_timerInterval); return; }
    if (prep <= 0) {
      clearInterval(_timerInterval);
      // Switch to exercise timer
      let remaining = seconds;
      el.textContent = remaining;
      el.previousElementSibling.textContent = 'Ejercicio';
      el.style.color = 'var(--success)';
      _timerInterval = setInterval(() => {
        remaining--;
        const el2 = document.getElementById('timer-count');
        if (!el2) { clearInterval(_timerInterval); return; }
        el2.textContent = remaining;
        if (remaining <= 3 && remaining > 0) beep(880, 0.15);
        if (remaining <= 0) {
          clearInterval(_timerInterval);
          beep(660, 0.4);
          setTimeout(() => beep(880, 0.4), 450);
          el2.textContent = '¡Listo!';
          el2.style.color = 'var(--accent-dark)';
        }
      }, 1000);
    } else {
      el.textContent = prep;
      if (prep <= 3) beep(440, 0.1);
    }
  }, 1000);
}

function cancelTimer() {
  if (_timerInterval) { clearInterval(_timerInterval); _timerInterval = null; }
  closeModal();
}

// ── Complete round / series ────────────────────
function completeRound(bi, roundIdx) {
  const block = liveState.blocks[bi];
  const isLastRound = roundIdx >= block.rounds - 1;

  if (isLastRound) {
    // Show post-block modal for RPE, notes, load per exercise
    showPostBlockModal(bi);
  } else {
    liveSession.roundIndex++;
    render();
  }
}

function showPostBlockModal(bi) {
  const block = liveState.blocks[bi];
  openModal(`
    <div class="modal-handle"></div>
    <div class="modal-title">Bloque completado ✓</div>
    <p class="text-sm text-muted" style="margin-bottom:16px;">Añade detalles opcionales para cada ejercicio.</p>
    ${block.exercises.map((ex, ei) => {
      const resultKey = `${bi}_${ei}`;
      const res = liveSession.results[resultKey] || {};
      const mat = ex.material || '';
      const needsKg = ['Mancuerna','Barra','Kettlebell'].includes(mat);
      const needsResist = ['Goma','Miniband'].includes(mat);
      return `

        ${needsKg ? `
        <div class="form-group">
          <label>${mat==='Mancuerna'?'Kg por mancuerna':'Kg totales'}</label>
          <input type="number" min="0" step="0.5" value="${res.kg||''}" placeholder="ej. 10" id="res-kg-${bi}-${ei}" onchange="setResult('${bi}_${ei}','kg',+this.value||null);">
        </div>` : ''}
        ${needsResist ? `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          <div class="form-group">
            <label>Resist. usada</label>
            <input type="number" min="1" value="${res.resist_used||''}" id="res-ru-${bi}-${ei}" onchange="setResult('${bi}_${ei}','resist_used',+this.value||null);">
          </div>
          <div class="form-group">
            <label>Resist. máx</label>
            <input type="number" min="1" value="${res.resist_max||''}" id="res-rm-${bi}-${ei}" onchange="setResult('${bi}_${ei}','resist_max',+this.value||null);">
          </div>
        </div>` : ''}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          <div class="form-group">
            <label>RPE (1-10)</label>
            <input type="number" min="1" max="10" value="${res.rpe||''}" placeholder="7" id="res-rpe-${bi}-${ei}" onchange="setResult('${bi}_${ei}','rpe',+this.value||null);">
          </div>
          <div></div>
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label>Comentarios</label>
          <input type="text" value="${res.notes||''}" placeholder="Notas del ejercicio" id="res-notes-${bi}-${ei}" onchange="setResult('${bi}_${ei}','notes',this.value);">
        </div>
      </div>`;
    }).join('')}
    <button class="btn btn-primary btn-full" onclick="advanceBlock(${bi})">
      ${bi < liveState.blocks.length - 1 ? 'Siguiente bloque →' : 'Finalizar entreno'}
    </button>
    <button class="btn btn-full mt-8" onclick="closeModal();liveSession.blocks&&liveSession.blocks.push&&null;liveSession.roundIndex++;render();">
      + Añadir serie extra antes
    </button>
  `);
}

function setResult(key, field, val) {
  if (!liveSession.results[key]) liveSession.results[key] = {};
  liveSession.results[key][field] = val;
}

function advanceBlock(bi) {
  closeModal();
  liveSession.blockIndex++;
  liveSession.roundIndex = 0;
  if (liveSession.blockIndex >= liveState.blocks.length) {
    liveSession.done = true;
  }
  render();
}

function finishWorkout() {
  confirmModal('¿Finalizar el entreno?', () => { liveSession.done = true; render(); }, 'Finalizar');
}

// ── FINISH SCREEN ─────────────────────────────
function renderLiveFinish() {
  const elapsed = Math.round((Date.now() - liveSession.startTime) / 60000);
  return `
  <div class="page-header">
    <h1>¡Entreno completado! 🎉</h1>
  </div>
  <div class="section">
    <div class="card" style="border-color:var(--success);background:var(--success-bg);text-align:center;padding:20px;margin-bottom:16px;">
      <div style="font-size:36px;font-weight:700;color:var(--success);">${elapsed}<span style="font-size:16px;font-weight:400;">min</span></div>
      <div class="text-sm text-muted">duración</div>
    </div>
    <div class="form-group">
      <label>Duración (min) — editable</label>
      <input type="number" id="live-duration" value="${elapsed}" min="1" max="300">
    </div>
    <div class="form-group">
      <label>Kcal consumidas</label>
      <input type="number" id="live-kcal" placeholder="ej. 250" min="0" max="9999">
    </div>
    <div class="form-group">
      <label>Notas del entreno</label>
      <textarea id="live-notes" placeholder="Observaciones generales..." style="min-height:80px;"></textarea>
    </div>
    <button class="btn btn-primary btn-full" style="padding:14px;font-size:16px;" onclick="transferLiveToLog()">
      Revisar y guardar →
    </button>
    <button class="btn btn-full mt-8" style="color:var(--text3);" onclick="discardLive()">Descartar</button>
  </div>`;
}

function transferLiveToLog() {
  const duration = +document.getElementById('live-duration').value || null;
  const kcal = +document.getElementById('live-kcal').value || null;
  const notes = document.getElementById('live-notes').value || '';

  // Build exercises array from blocks + results
  const exercises = [];
  liveState.blocks.forEach((block, bi) => {
    block.exercises.forEach((ex, ei) => {
      const key = `${bi}_${ei}`;
      const res = liveSession.results[key] || {};
      // Find exercise id from DB
      const dbEx = DB.exercises.find(e => e.name === ex.name || e.id === ex.exId);
      exercises.push({
        id: dbEx?.id || ex.exId || uid(),
        name: ex.name,
        sets: block.rounds,
        reps: ex.reps || (ex.timeSeconds ? ex.timeSeconds+'s' : ''),
        material: ex.material || '',
        kg: res.kg || null,
        resist_used: res.resist_used || null,
        resist_max: res.resist_max || null,
        rpe: res.rpe || null,
        notes: res.notes || ''
      });
    });
  });

  // Pre-fill logState
  resetLogState();
  logState.date = liveState.date;
  logState.cycle = liveState.cycle;
  logState.sleep = liveState.sleep;
  logState.energy = liveState.energy;
  logState.stress = liveState.stress;
  logState.motivation = liveState.motivation;
  logState.soreness = liveState.soreness;
  logState.duration = duration;
  logState.kcal = kcal;
  logState.notes = notes;
  logState.exercises = exercises;

  // Reset live state
  liveState = null;
  liveSession = null;

  navigate('log');
  toast('Datos del entreno pre-rellenados ✓');
}

const GD = {
  CLIENT_ID: '793984458574-f90mqhavg1kb3o9ui6gtmtqhoqhib9rq.apps.googleusercontent.com',
  REDIRECT_URI: 'https://l-balart.github.io/entrenos/',
  SCOPE: 'https://www.googleapis.com/auth/drive.file',
  FILE_NAME: 'entrenos_data.json',

  get token() { return localStorage.getItem('gd_token'); },
  set token(v) { if(v) localStorage.setItem('gd_token', v); else localStorage.removeItem('gd_token'); },
  get expiry() { return parseInt(localStorage.getItem('gd_expiry')||'0'); },
  set expiry(v) { localStorage.setItem('gd_expiry', String(v)); },
  get fileId() { return localStorage.getItem('gd_file_id'); },
  set fileId(v) { if(v) localStorage.setItem('gd_file_id', v); else localStorage.removeItem('gd_file_id'); },

  isConnected() { return !!this.token && Date.now() < this.expiry; },

  login() {
    const state = Math.random().toString(36).slice(2);
    localStorage.setItem('gd_state', state);
    const params = new URLSearchParams({
      client_id: this.CLIENT_ID,
      redirect_uri: this.REDIRECT_URI,
      response_type: 'token',
      scope: this.SCOPE,
      state,
      prompt: 'consent'
    });
    window.location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + params;
  },

  logout() {
    this.token = null; this.expiry = 0; this.fileId = null;
    localStorage.removeItem('gd_state');
    updateSyncBar();
    toast('Desconectado de Google Drive');
    render();
  },

  async findFile() {
    const r = await fetch(
      `https://www.googleapis.com/drive/v3/files?q=name='${this.FILE_NAME}'+and+trashed=false&fields=files(id,modifiedTime)`,
      { headers: { Authorization: 'Bearer ' + this.token } }
    );
    if (!r.ok) return null;
    const d = await r.json();
    return d.files?.[0] || null;
  },

  async readFile(fileId) {
    const r = await fetch(
      `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
      { headers: { Authorization: 'Bearer ' + this.token } }
    );
    if (!r.ok) return null;
    return await r.json();
  },

  async writeFile(data) {
    const body = JSON.stringify(data);
    const fileId = this.fileId;
    if (fileId) {
      // Update existing
      const r = await fetch(
        `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,
        { method: 'PATCH', headers: { Authorization: 'Bearer ' + this.token, 'Content-Type': 'application/json' }, body }
      );
      return r.ok;
    } else {
      // Create new — two-step multipart
      const meta = JSON.stringify({ name: this.FILE_NAME, mimeType: 'application/json' });
      const boundary = 'entrenos_boundary';
      const mp = `--${boundary}\r\nContent-Type: application/json\r\n\r\n${meta}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${body}\r\n--${boundary}--`;
      const r = await fetch(
        'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',
        { method: 'POST', headers: { Authorization: 'Bearer ' + this.token, 'Content-Type': `multipart/related; boundary=${boundary}` }, body: mp }
      );
      if (!r.ok) return false;
      const d = await r.json();
      this.fileId = d.id;
      return true;
    }
  },

  // Offline queue
  get pendingSync() { return localStorage.getItem('gd_pending') === '1'; },
  set pendingSync(v) { localStorage.setItem('gd_pending', v ? '1' : '0'); },

  // Called after every saveSession / deleteSession / exercise change
  async push() {
    if (!this.isConnected()) {
      this.pendingSync = true;
      setSyncState('off', 'Sin conexión — cambios guardados localmente');
      return;
    }
    setSyncState('syncing', 'Guardando en Drive...');
    const data = { version: 1, saved_at: new Date().toISOString(), sessions: DB.sessions, exercises: DB.exercises };
    const ok = await this.writeFile(data);
    if (ok) {
      this.pendingSync = false;
      setSyncState('ok', 'Sincronizado · ' + new Date().toLocaleTimeString('es-ES', {hour:'2-digit',minute:'2-digit'}));
    } else {
      this.pendingSync = true;
      setSyncState('err', 'Error al guardar — reintentando al reconectar');
    }
  },

  // Flush pending changes when connection is restored
  async flushPending() {
    if (!this.pendingSync) return;
    if (!this.isConnected()) return;
    setSyncState('syncing', 'Sincronizando cambios pendientes...');
    const data = { version: 1, saved_at: new Date().toISOString(), sessions: DB.sessions, exercises: DB.exercises };
    const ok = await this.writeFile(data);
    if (ok) { this.pendingSync = false; setSyncState('ok', 'Cambios pendientes sincronizados ✓'); }
  },

  // Called on startup — checks Drive for newer data
  async checkOnStartup() {
    if (!this.isConnected()) { updateSyncBar(); return; }
    setSyncState('syncing', 'Comprobando Drive...');
    try {
      const file = await this.findFile();
      if (!file) {
        // No file in Drive yet — push local data
        this.fileId = null;
        await this.push();
        return;
      }
      this.fileId = file.id;
      const driveData = await this.readFile(file.id);
      if (!driveData) { setSyncState('err', 'No se pudo leer Drive'); return; }

      const localSessions = DB.sessions;
      const driveSessions = driveData.sessions || [];

      if (localSessions.length === 0) {
        // Nothing local — load Drive silently
        DB.sessions = driveSessions;
        DB.exercises = driveData.exercises || DB.exercises;
        setSyncState('ok', 'Datos cargados de Drive');
        render();
        return;
      }

      // Compare last modified dates
      const localLast = localSessions.map(s=>s.date).sort().pop() || '';
      const driveLast = driveSessions.map(s=>s.date).sort().pop() || '';
      const driveCount = driveSessions.length;
      const localCount = localSessions.length;

      if (localLast === driveLast && localCount === driveCount) {
        setSyncState('ok', 'Sincronizado · Drive al día');
        return;
      }

      // Ask user
      showConflictModal(localLast, localCount, driveLast, driveCount, driveData);
    } catch(e) {
      setSyncState('err', 'Error de conexión con Drive');
    }
  }
};

function setSyncState(state, msg) {
  const bar = document.getElementById('sync-bar');
  const dot = document.getElementById('sync-dot');
  const msgEl = document.getElementById('sync-msg');
  if (!bar || !dot || !msgEl) return;
  bar.classList.remove('hidden');
  dot.className = 'sync-dot ' + state;
  msgEl.textContent = msg;
}

    setSyncState('off', 'Google Drive desconectado');
    if (btn) btn.textContent = 'Conectar';
  }
}

}

function showConflictModal(localLast, localCount, driveLast, driveCount, driveData) {
  openModal(`

    <div class="modal-title">Conflicto de datos</div>
    <p class="text-sm" style="color:var(--text2);margin-bottom:16px;">Hay diferencias entre los datos locales y los de Google Drive.</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;">
      <div class="score-card">
        <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;">Este dispositivo</div>
        <div style="font-size:22px;font-weight:700;">${localCount}</div>
        <div class="text-sm text-muted">entrenos</div>
        <div class="text-sm" style="margin-top:4px;color:var(--text2);">Último: ${localLast}</div>
      </div>
      <div class="score-card">
        <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;">Google Drive</div>
        <div style="font-size:22px;font-weight:700;">${driveCount}</div>
        <div class="text-sm text-muted">entrenos</div>
        <div class="text-sm" style="margin-top:4px;color:var(--text2);">Último: ${driveLast}</div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <button class="btn btn-primary btn-full" onclick="resolveConflict('merge', ${JSON.stringify(driveData).replace(/"/g,'&quot;')})">
        Fusionar (combinar ambos, sin duplicados)
      </button>
      <button class="btn btn-full" onclick="resolveConflict('drive', ${JSON.stringify(driveData).replace(/"/g,'&quot;')})">
        Usar Drive (sobreescribe lo local)
      </button>
      <button class="btn btn-full" onclick="resolveConflict('local', null)">
        Usar este dispositivo (sobreescribe Drive)
      </button>
    </div>
  `);
}

async function resolveConflict(choice, driveData) {
  closeModal();
  if (choice === 'drive') {
    DB.sessions = driveData.sessions;
    DB.exercises = driveData.exercises || DB.exercises;
    toast('Datos de Drive cargados ✓');
  } else if (choice === 'merge') {
    const sessionMap = {};
    DB.sessions.forEach(s => { sessionMap[s.id] = s; });
    (driveData.sessions || []).forEach(s => { if (!sessionMap[s.id]) sessionMap[s.id] = s; });
    DB.sessions = Object.values(sessionMap).sort((a,b) => a.date.localeCompare(b.date));
    toast('Datos fusionados ✓');
  }
  // choice === 'local': keep as is, just push
  render();
  await GD.push();
}

// Handle OAuth redirect — extract token from URL hash
function handleOAuthRedirect() {
  if (!window.location.hash) return;
  const params = new URLSearchParams(window.location.hash.slice(1));
  const token = params.get('access_token');
  const expiresIn = parseInt(params.get('expires_in') || '3600');
  const state = params.get('state');
  if (!token) return;
  if (state !== localStorage.getItem('gd_state')) { toast('Error de autenticación'); return; }
  GD.token = token;
  GD.expiry = Date.now() + expiresIn * 1000;
  // Clean URL
  history.replaceState(null, '', window.location.pathname);
  toast('Google Drive conectado ✓');
  updateSyncBar();
  GD.checkOnStartup();
}

function exportData() {
  const data = {
    version: 1,
    exported_at: new Date().toISOString(),
    sessions: DB.sessions,
    exercises: DB.exercises
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'entrenos_backup_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('Backup exportado ✓');
}

function triggerImport() {
  document.getElementById('import-file').click();
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.sessions || !data.exercises) throw new Error('Formato inválido');
      const existingIds = new Set(DB.sessions.map(s => s.id));
      const newSessions = data.sessions.filter(s => !existingIds.has(s.id));
      const existingExIds = new Set(DB.exercises.map(ex => ex.id));
      const newExercises = data.exercises.filter(ex => !existingExIds.has(ex.id));
      DB.sessions = [...DB.sessions, ...newSessions];
      DB.exercises = [...DB.exercises, ...newExercises];
      toast(`Importados: ${newSessions.length} entrenos, ${newExercises.length} ejercicios nuevos ✓`);
      render();
    } catch(err) {
      toast('Error: archivo no válido');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function loadHistoricalData() {
  const sessionMap = {};
  DB.sessions.forEach(s => { sessionMap[s.id] = s; });
  let updated = 0, added = 0;
  HISTORICAL_DATA.sessions.forEach(s => {
    if (sessionMap[s.id]) {
      let changed = false;
      if ((sessionMap[s.id].kcal == null || sessionMap[s.id].kcal === 0) && s.kcal) {
        sessionMap[s.id].kcal = s.kcal; changed = true;
      }
      if ((sessionMap[s.id].duration == null || sessionMap[s.id].duration === 0) && s.duration) {
        sessionMap[s.id].duration = s.duration; changed = true;
      }
      if (changed) updated++;
    } else {
      sessionMap[s.id] = s; added++;
    }
  });
  DB.sessions = Object.values(sessionMap);
  const existingExIds = new Set(DB.exercises.map(ex => ex.id));
  const newExercises = HISTORICAL_DATA.exercises.filter(ex => !existingExIds.has(ex.id));
  if (newExercises.length > 0) DB.exercises = [...DB.exercises, ...newExercises];
  localStorage.setItem('historical_loaded_v3', '1');
  if (added > 0 || updated > 0) toast(`Historial: ${added} nuevos, ${updated} actualizados ✓`);
  render();
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
if (!localStorage.getItem('historical_loaded_v3')) {
  loadHistoricalData();
} else {
  render();
}
// Handle OAuth redirect first (token in URL hash)
handleOAuthRedirect();
// Check Drive on startup if connected
if (GD.isConnected()) {
  GD.checkOnStartup();
} else {
  updateSyncBar();
}
// Flush pending sync when connection is restored
window.addEventListener('online', () => { GD.flushPending(); });
// Show pending indicator on load if needed
if (GD.pendingSync) { setSyncState('err', 'Cambios pendientes de sincronizar'); }
